<script>
// ============================================================
// DATA: Question Bank (80+ questions across all topics)
// ============================================================
const TOPICS = {
  ISMP: "IS-MP Model",
  ADIA: "AD-IA Model",
  PHILLIPS: "Phillips Curve",
  SOLOW: "Solow Growth",
  MONETARY: "Monetary Policy",
  FISCAL: "Fiscal Policy",
  EXCHANGE: "Exchange Rates",
  INFLATION: "Inflation Expectations",
  OPEN: "Open Economy Macro"
};

// -- Topic Reviews (structured content for each model) --
const topicReviews = {
  ISMP: {
    title: "IS-MP Model",
    sections: [
      {heading: "Core Idea", content: "The IS-MP model determines short-run output (Y) and the real interest rate (r). It replaces the LM curve with an explicit monetary policy rule, reflecting how modern central banks set interest rates rather than targeting the money supply."},
      {heading: "IS Curve", content: "Shows goods market equilibrium: combinations of Y and r where planned expenditure equals output. Slopes downward because lower r stimulates investment and consumption, raising Y.\n\nKey equation: Y = C(Y-T) + I(r) + G + NX"},
      {heading: "MP Curve", content: "Represents the central bank's reaction function. Typically upward-sloping or flat: the central bank raises r when output (or inflation) rises.\n\nSimple form: r = r* + policy response to conditions"},
      {heading: "Shifts", content: "IS shifts right: higher G, lower T, increased confidence, wealth effects, stronger exports.\nIS shifts left: fiscal contraction, confidence drops, negative wealth shocks.\n\nMP shifts up: hawkish policy change (central bank raises r at every output level).\nMP shifts down: dovish shift."},
      {heading: "Equilibrium", content: "The intersection of IS and MP gives short-run equilibrium Y and r. A rightward IS shift along an upward-sloping MP curve raises both output and the real interest rate."},
      {heading: "Key Intuition", content: "Fiscal expansion shifts IS right, raising Y but also r (partial crowding out via the MP curve). The steeper the MP curve (more hawkish central bank), the more crowding out occurs and the less output responds."}
    ]
  },
  ADIA: {
    title: "AD-IA Model",
    sections: [
      {heading: "Core Idea", content: "The AD-IA framework shows how output and inflation evolve over time. It bridges the short run (IS-MP) to medium-run adjustment. The AD curve comes from IS-MP; the IA line captures inflation persistence."},
      {heading: "AD Curve", content: "Derived from IS-MP: shows the negative relationship between inflation (pi) and output (Y). Higher inflation causes the central bank to raise r (MP response), which reduces Y along IS.\n\nSlopes downward in (Y, pi) space."},
      {heading: "IA Line", content: "A horizontal line at the current inflation rate. Reflects adaptive expectations: inflation today depends on inflation yesterday. Shifts up when actual inflation exceeds expected; shifts down when below.\n\nThis captures inflation persistence and inertia."},
      {heading: "Short-Run vs. Long-Run", content: "Short-run equilibrium: where AD intersects IA. Output can deviate from potential.\n\nLong-run equilibrium: AD intersects IA at potential output (Y*). Inflation is stable and equals expected inflation. No output gap."},
      {heading: "Demand Shocks", content: "Positive demand shock: AD shifts right. Output rises above Y*, inflation rises. Over time, IA shifts up, output returns to Y* at higher inflation.\n\nNegative demand shock: AD shifts left. Output falls, inflation gradually declines. IA drifts down until equilibrium is restored."},
      {heading: "Supply Shocks", content: "Negative supply shock (oil spike): IA shifts up. Stagflation: higher inflation, lower output. Central bank faces a dilemma: tighten to fight inflation (deeper recession) or accommodate (risk embedding higher expectations).\n\nPositive supply shock: IA shifts down. Lower inflation, higher output. The easy case."},
      {heading: "Key Intuition", content: "Demand shocks move the economy along the IA line in the short run; supply shocks shift the IA line itself. The economy self-corrects over time as inflation expectations adjust, but the speed depends on how quickly expectations adapt."}
    ]
  },
  PHILLIPS: {
    title: "Phillips Curve",
    sections: [
      {heading: "Core Equation", content: "pi = pi_e - beta(u - u_n) + v\n\npi = actual inflation\npi_e = expected inflation\nu = actual unemployment\nu_n = natural rate (NAIRU)\nbeta = slope (sensitivity of inflation to labor market slack)\nv = supply shock term"},
      {heading: "Short-Run Tradeoff", content: "For given expectations (pi_e fixed), lower unemployment is associated with higher inflation. This is the short-run Phillips Curve (SRPC), which slopes downward in (u, pi) space."},
      {heading: "Long-Run Vertical", content: "In the long run, expectations adjust to match actual inflation. The long-run Phillips Curve (LRPC) is vertical at u_n. No permanent tradeoff exists: you can't buy permanently lower unemployment with higher inflation."},
      {heading: "Expectations Shifts", content: "When pi_e rises, the entire SRPC shifts up. At every unemployment rate, inflation is higher. This is why sustained expansionary policy leads to accelerating inflation, not just higher inflation."},
      {heading: "Sacrifice Ratio", content: "The cumulative output (or unemployment) cost of reducing inflation by 1 percentage point. With adaptive expectations and slow adjustment, the sacrifice ratio is high. With credible policy and rational expectations, it can be lower."},
      {heading: "Key Intuition", content: "u < u_n: inflation rises above expectations (overheating).\nu > u_n: inflation falls below expectations (slack).\nu = u_n: inflation equals expectations (stable).\n\nThe Phillips Curve is the mechanism through which output gaps translate into inflation changes in the AD-IA model."}
    ]
  },
  SOLOW: {
    title: "Solow Growth Model",
    sections: [
      {heading: "Core Equations", content: "Production: Y = A * F(K, L), typically Y = A * K^alpha * L^(1-alpha)\n\nPer worker: y = A * k^alpha, where k = K/L\n\nCapital accumulation: dk = sy - (n + delta)k\n\nSteady state: sy* = (n + delta)k*"},
      {heading: "Steady State", content: "The economy converges to a steady state where investment exactly replaces depreciated capital and equips new workers. At k*, output per worker (y*) is constant.\n\nHigher saving rate (s): raises k* and y* (level effect, not growth effect).\nHigher population growth (n): lowers k* and y* (more workers to equip)."},
      {heading: "Convergence", content: "Countries below their steady state grow faster (high MPK, diminishing returns haven't fully kicked in). This predicts conditional convergence: countries with similar fundamentals converge to similar income levels."},
      {heading: "Golden Rule", content: "The saving rate that maximizes steady-state consumption per worker. At the Golden Rule k:\n\nMPK = delta + n\n\nConsumption is maximized when the marginal product of capital equals the break-even rate."},
      {heading: "Role of Technology", content: "In the basic model, only TFP growth (A) drives sustained per-capita growth. Capital accumulation alone leads to a steady state due to diminishing returns. TFP captures technology, institutions, education, and other efficiency gains."},
      {heading: "Growth Accounting", content: "Growth in Y = growth in A + alpha * growth in K + (1-alpha) * growth in L\n\nThe Solow residual (TFP growth) is the portion of output growth not explained by factor accumulation. Often accounts for the majority of growth in developed economies."},
      {heading: "Key Intuition", content: "Saving and investment determine the level of income, not the growth rate. Only technology improvements generate permanent per-capita growth. This is why policy focus on innovation and institutions matters more for long-run prosperity than simply raising the saving rate."}
    ]
  },
  MONETARY: {
    title: "Monetary Policy",
    sections: [
      {heading: "Transmission Mechanism", content: "Central bank changes policy rate, which affects:\n1. Market interest rates (borrowing costs)\n2. Asset prices (stocks, bonds, housing)\n3. Exchange rates (capital flows)\n4. Credit conditions (lending standards)\n\nThese channels influence consumption, investment, net exports, and ultimately output and inflation. Lags are long and variable (12-18 months)."},
      {heading: "Taylor Rule", content: "i = r* + pi + 0.5(pi - pi*) + 0.5(Y - Y*)/Y*\n\nPrescribes the nominal interest rate based on:\n- r* = neutral real rate (~2%)\n- pi = current inflation\n- pi* = inflation target (~2%)\n- Output gap = (Y - Y*)/Y*\n\nWeights of 0.5 are benchmarks. Hawkish central banks use higher weights on inflation."},
      {heading: "Zero Lower Bound (ZLB)", content: "Nominal rates can't go significantly below zero (cash offers 0% return). At the ZLB, conventional rate cuts are exhausted. Unconventional tools become necessary: QE, forward guidance, negative rates (limited)."},
      {heading: "Quantitative Easing", content: "Central bank purchases long-term assets (government bonds, MBS) to:\n- Lower long-term yields (portfolio balance channel)\n- Boost asset prices (wealth effect)\n- Signal commitment to easy policy (signaling channel)\n- Compress term premia\n\nWorks even when short rates are at zero."},
      {heading: "Forward Guidance", content: "Communicating the expected path of future policy rates. By shaping expectations, the central bank influences long-term rates and economic decisions today. Effective when credible. Two types: calendar-based ('rates low until 2025') and state-contingent ('rates low until unemployment falls below 5%')."},
      {heading: "Credibility", content: "A credible central bank anchors inflation expectations, reducing the sacrifice ratio of disinflation. Credibility is built through consistent action matching stated targets. Loss of credibility can trigger unanchored expectations and wage-price spirals."},
      {heading: "Key Intuition", content: "Monetary policy is the primary tool for demand management. It works through interest rate and asset price channels. Effectiveness depends on credibility, transmission mechanism health, and whether the ZLB binds. At the ZLB, fiscal policy becomes relatively more important."}
    ]
  },
  FISCAL: {
    title: "Fiscal Policy",
    sections: [
      {heading: "Government Spending Multiplier", content: "Simple Keynesian: multiplier = 1/(1 - MPC)\nIf MPC = 0.8, multiplier = 5.\n\nIn practice, multipliers are smaller (0.8-1.5) due to:\n- Crowding out (higher rates reduce private investment)\n- Import leakage\n- Monetary policy offset\n- Ricardian effects\n\nMultipliers are larger at the ZLB (no monetary offset) and during recessions (more slack)."},
      {heading: "Tax Multiplier", content: "Tax multiplier = -MPC/(1 - MPC)\nSmaller in absolute value than the spending multiplier because the first round of spending is reduced by MPC.\n\nBalanced-budget multiplier = 1. Equal increases in G and T raise GDP by exactly the amount of the spending increase."},
      {heading: "Automatic Stabilizers", content: "Fiscal mechanisms that automatically dampen business cycles without new legislation:\n- Progressive income taxes (revenue falls in recession, rises in boom)\n- Unemployment insurance (spending rises in recession)\n- Welfare programs\n\nThey reduce the amplitude of cycles but can't eliminate them."},
      {heading: "Crowding Out", content: "Government borrowing competes for loanable funds, pushing up interest rates and reducing private investment. Stronger when the economy is near full capacity. At the ZLB, crowding out is minimal because rates can't rise."},
      {heading: "Ricardian Equivalence", content: "Theory: consumers anticipate future taxes to repay debt, so they save the tax cut rather than spend it. Tax cuts have no demand effect.\n\nIn practice, this is a benchmark. It fails when consumers are liquidity-constrained, myopic, or if the debt is rolled over indefinitely."},
      {heading: "Structural vs. Cyclical Deficit", content: "Structural deficit: the deficit at potential output (underlying fiscal stance).\nCyclical deficit: the portion due to automatic stabilizers in recession.\n\nTotal deficit = structural + cyclical. Policy evaluation should focus on the structural deficit."},
      {heading: "Key Intuition", content: "Fiscal policy is most effective when monetary policy is constrained (ZLB), the economy has slack, and crowding out is limited. Countercyclical fiscal policy means expanding in recessions and consolidating in booms. Procyclical fiscal policy amplifies instability."}
    ]
  },
  EXCHANGE: {
    title: "Exchange Rates",
    sections: [
      {heading: "Uncovered Interest Parity (UIP)", content: "i_domestic - i_foreign = expected depreciation of domestic currency\n\nIf US rates exceed EU rates by 3%, the dollar is expected to depreciate by 3% to equalize returns. Arbitrage enforces this in the absence of risk premia."},
      {heading: "Purchasing Power Parity (PPP)", content: "Long-run theory: exchange rates adjust so identical goods cost the same across countries.\n\nRelative PPP: the rate of depreciation equals the inflation differential. If US inflation exceeds EU inflation by 2%, the dollar depreciates by 2% annually.\n\nHolds roughly in the long run, poorly in the short run."},
      {heading: "Currency Depreciation Effects", content: "Exports become cheaper (volume rises), imports become more expensive (volume falls). Net exports improve.\n\nJ-Curve: trade balance initially worsens (contracts priced in foreign currency) before improving as volumes adjust. Typically 6-18 months."},
      {heading: "Capital Flows", content: "Higher domestic interest rates attract foreign capital, increasing demand for domestic currency and causing appreciation. Capital account surplus finances current account deficit.\n\nSudden stops (capital outflows) can trigger currency crises, especially with fixed exchange rates."},
      {heading: "Fixed vs. Floating Rates", content: "Fixed: central bank commits to a peg, uses reserves to maintain it. Provides stability but sacrifices monetary policy independence.\n\nFloating: market-determined. Allows independent monetary policy but introduces exchange rate volatility.\n\nThe Mundell-Fleming trilemma governs the tradeoffs."},
      {heading: "Key Intuition", content: "In the short run, exchange rates are driven by capital flows and interest rate differentials (UIP). In the long run, they're driven by relative price levels (PPP). Depreciation is expansionary (boosts net exports) but inflationary (raises import costs)."}
    ]
  },
  INFLATION: {
    title: "Inflation Expectations",
    sections: [
      {heading: "Why Expectations Matter", content: "Inflation expectations are self-fulfilling. If workers expect higher inflation, they demand higher wages. Firms raise prices to cover costs. Actual inflation rises to match expectations. This is the expectations channel of the Phillips Curve."},
      {heading: "Adaptive Expectations", content: "Agents look backward: pi_e = pi_t-1 (or a weighted average of past inflation). Adjustment is slow. This creates inflation persistence and makes disinflation costly.\n\nImplication: the sacrifice ratio is high because expectations only fall after a prolonged period of low actual inflation."},
      {heading: "Rational Expectations", content: "Agents use all available information to form expectations. They understand the model and policy rule. Anticipated policy has no real effects (only surprise policy moves output).\n\nImplication: credible disinflation can be costless if expectations adjust immediately (Sargent's view)."},
      {heading: "Anchored vs. Unanchored", content: "Anchored: long-run expectations remain near the central bank's target despite short-run shocks. The central bank has credibility. Supply shocks don't spiral.\n\nUnanchored: expectations drift with actual inflation. Creates wage-price spirals. Requires aggressive policy response (Volcker-style tightening)."},
      {heading: "Fisher Equation", content: "i = r + pi_e\n\nNominal interest rate = real interest rate + expected inflation.\n\nImplication: for a given real rate, higher expected inflation raises nominal rates. Central banks must raise nominal rates more than one-for-one with inflation expectations to raise real rates (the Taylor principle)."},
      {heading: "Key Intuition", content: "Central bank credibility is the primary anchor for expectations. With anchored expectations, the central bank can 'look through' temporary supply shocks. Without credibility, every shock risks becoming embedded in expectations, requiring costly disinflation."}
    ]
  },
  OPEN: {
    title: "Open Economy Macro",
    sections: [
      {heading: "Mundell-Fleming Trilemma", content: "A country can only achieve two of three:\n1. Free capital mobility\n2. Fixed exchange rate\n3. Independent monetary policy\n\nAdvanced economies typically choose (1) + (3), letting the rate float. Some emerging markets choose (2) + (3), imposing capital controls. No country achieves all three simultaneously."},
      {heading: "Balance of Payments", content: "Current account + Capital account = 0\n\nCurrent account deficit (imports > exports) must be financed by capital account surplus (net capital inflows). A country that borrows from abroad runs a current account deficit."},
      {heading: "Twin Deficits", content: "From national accounting: (S - I) = (G - T) + NX\n\nA budget deficit (G > T) can lead to a current account deficit if private saving doesn't rise to offset it. The hypothesis: fiscal deficits cause trade deficits."},
      {heading: "Mundell-Fleming Results", content: "Flexible rates:\n- Monetary expansion: depreciates currency, boosts net exports, very effective.\n- Fiscal expansion: appreciates currency, crowds out net exports, less effective.\n\nFixed rates:\n- Monetary expansion: impossible (must defend peg).\n- Fiscal expansion: very effective (no exchange rate offset)."},
      {heading: "Currency Crises", content: "Occur when fixed rate regimes face speculative attacks. Triggers: large current account deficits, overvalued currency, low reserves, loss of confidence.\n\nDefense options: raise rates sharply (contractionary), spend reserves (limited), impose capital controls, or abandon the peg."},
      {heading: "Key Intuition", content: "In open economies, exchange rates create additional transmission channels for monetary and fiscal policy. The effectiveness of each policy depends critically on the exchange rate regime and capital mobility. Flexible rates enhance monetary policy power; fixed rates enhance fiscal policy power."}
    ]
  }
};

// -- Flashcards (Concept Review) --
const flashcards = [
  {topic:"ISMP",front:"What does the IS curve represent?",back:"The IS curve shows combinations of output (Y) and the real interest rate (r) where the goods market is in equilibrium. It slopes downward: lower r stimulates investment and consumption, raising Y."},
  {topic:"ISMP",front:"What does the MP curve represent?",back:"The MP curve represents the central bank's monetary policy rule, showing how it sets the real interest rate as a function of economic conditions (inflation, output gap). It is typically upward-sloping or flat."},
  {topic:"ISMP",front:"What shifts the IS curve right?",back:"Expansionary fiscal policy (higher G or lower T), increased consumer/business confidence, a wealth effect from rising asset prices, or stronger foreign demand for exports."},
  {topic:"ADIA",front:"What is the AD curve in the AD-IA framework?",back:"The AD curve shows the negative relationship between inflation and output, derived from the IS-MP model. Higher inflation leads the central bank to raise r (via MP), which reduces Y along the IS curve."},
  {topic:"ADIA",front:"What is the IA (Inflation Adjustment) line?",back:"The IA line is a horizontal line at the current inflation rate, reflecting adaptive inflation expectations. It shifts up when inflation expectations rise and down when they fall. It captures inflation persistence."},
  {topic:"ADIA",front:"How does a negative demand shock appear in AD-IA?",back:"The AD curve shifts left, moving the economy to a point below potential output. Inflation initially stays on the IA line but gradually falls as the output gap persists, shifting IA downward over time."},
  {topic:"PHILLIPS",front:"State the expectations-augmented Phillips Curve.",back:"pi = pi_e - beta(u - u_n) + v, where pi is inflation, pi_e is expected inflation, u is unemployment, u_n is the natural rate, beta > 0, and v represents supply shocks."},
  {topic:"PHILLIPS",front:"What is the sacrifice ratio?",back:"The sacrifice ratio is the cumulative percentage of GDP that must be forgone to reduce inflation by 1 percentage point. It measures the real cost of disinflation and depends on how quickly expectations adjust."},
  {topic:"SOLOW",front:"What are the key equations of the Solow model?",back:"Y = F(K,L) (production function), capital accumulation: dK = sY - deltaK. In steady state, sY* = deltaK*, meaning investment equals depreciation. Per-worker: y = f(k), dk = sy - (n+delta)k."},
  {topic:"SOLOW",front:"What causes long-run growth in the Solow model?",back:"In the basic Solow model, only technological progress (TFP growth) drives sustained per-capita growth. Capital accumulation alone leads to a steady state due to diminishing returns."},
  {topic:"SOLOW",front:"What is the Golden Rule level of capital?",back:"The capital stock that maximizes steady-state consumption. It occurs where MPK = delta + n (marginal product of capital equals depreciation rate plus population growth). Saving rate is set so s*f(k) = (n+delta)k at that k."},
  {topic:"MONETARY",front:"How does monetary policy transmit through the economy?",back:"Central bank lowers/raises policy rate, which affects market interest rates, asset prices, exchange rates, and credit conditions. These channels influence consumption, investment, net exports, and ultimately output and inflation."},
  {topic:"MONETARY",front:"What is the Taylor Rule?",back:"r = r* + 0.5(pi - pi*) + 0.5(Y - Y*)/Y*, where r* is the neutral real rate, pi* is the inflation target. It prescribes rate adjustments based on deviations of inflation and output from targets."},
  {topic:"FISCAL",front:"What is the government spending multiplier?",back:"In a simple Keynesian model, the multiplier is 1/(1 - MPC). If MPC = 0.8, multiplier = 5. In practice it's smaller due to crowding out, imports, and monetary policy offset. Typically estimated at 0.8 to 1.5."},
  {topic:"FISCAL",front:"What is Ricardian Equivalence?",back:"The theory that consumers, anticipating future taxes to repay government debt, increase saving to offset fiscal stimulus. If true, tax cuts have no effect on demand. In practice, it's a theoretical benchmark; liquidity constraints and myopia weaken it."},
  {topic:"EXCHANGE",front:"What is the interest rate parity condition?",back:"Uncovered interest parity: i_domestic - i_foreign = expected depreciation of domestic currency. If US rates exceed EU rates, the dollar is expected to depreciate to equalize returns on comparable assets."},
  {topic:"EXCHANGE",front:"How does a currency depreciation affect the economy?",back:"Exports become cheaper (boosting demand), imports become more expensive (reducing demand for imports, raising domestic prices). Net exports improve (with a J-curve lag). It's expansionary but can be inflationary."},
  {topic:"INFLATION",front:"Anchored vs. unanchored inflation expectations?",back:"Anchored: long-run expectations stay near the central bank's target regardless of short-run shocks. Unanchored: expectations drift with actual inflation, creating self-fulfilling spirals. Credible monetary policy anchors expectations."},
  {topic:"OPEN",front:"What is the Mundell-Fleming trilemma?",back:"A country can only have two of three: (1) free capital flows, (2) fixed exchange rate, (3) independent monetary policy. Most advanced economies choose free capital flows + independent policy, letting the exchange rate float."}
];

  {topic:"OPEN",q:"A current account deficit is necessarily financed by:",options:["A capital account surplus (net capital inflows)","Higher taxes","Money printing","Reduced government spending"],answer:0,why:"By the balance of payments identity: current account + capital account = 0. A current account deficit must be matched by capital inflows."},
  {topic:"OPEN",q:"In a small open economy with perfect capital mobility and flexible rates, monetary expansion:",options:["Depreciates the currency and is very effective at boosting output","Appreciates the currency","Has no effect on output","Only affects the price level"],answer:0,why:"Lower rates cause capital outflow, depreciating the currency, boosting net exports, amplifying the monetary stimulus. (Mundell-Fleming result)"},
  {topic:"ISMP",q:"The slope of the MP curve depends on:",options:["How aggressively the central bank responds to economic conditions","Consumer confidence","The saving rate","Government debt levels"],answer:0,why:"A steeper MP curve means the central bank raises rates more sharply in response to output/inflation changes (more hawkish rule)."},
  {topic:"PHILLIPS",q:"If the central bank permanently keeps unemployment below the natural rate:",options:["Inflation will continuously accelerate (accelerationist hypothesis)","Inflation will stabilize at a higher level","Deflation will occur","Nothing happens to inflation"],answer:0,why:"With u persistently below u_n, inflation exceeds expectations each period. Expectations ratchet up, and inflation accelerates continuously."},
  {topic:"SOLOW",q:"Which of the following would NOT increase steady-state output per worker?",options:["Higher population growth rate","Higher saving rate","Better technology","Lower depreciation rate"],answer:0,why:"Higher population growth (n) increases break-even investment, reducing k* and y*. The others all raise steady-state output per worker."},
  {topic:"MONETARY",q:"Open market operations refer to:",options:["Central bank buying or selling government bonds to change the money supply","Government issuing new bonds","Banks lending to each other","Fiscal deficit monetization only"],answer:0,why:"OMOs are the primary tool: buying bonds injects reserves (expansionary), selling bonds drains reserves (contractionary)."},
  {topic:"FISCAL",q:"Austerity during a recession is criticized because:",options:["It can create a deflationary spiral by reducing demand when the economy is already weak","It always causes hyperinflation","It increases the money supply","It strengthens the exchange rate"],answer:0,why:"Cutting spending/raising taxes in a recession reduces aggregate demand further, potentially deepening the downturn and creating a self-defeating fiscal consolidation."},
  {topic:"EXCHANGE",q:"The J-curve effect describes:",options:["Trade balance initially worsening after depreciation before improving","Trade balance immediately improving after depreciation","Exchange rates always overshooting","Capital flows following a J-shaped pattern"],answer:0,why:"After depreciation, import prices rise immediately (worsening the balance in value terms) while export volumes adjust slowly. The trade balance traces a J shape."},
  {topic:"OPEN",q:"The twin deficits hypothesis links:",options:["Budget deficits to current account deficits","Trade surplus to budget surplus","Inflation to unemployment","Saving to investment only"],answer:0,why:"From national accounting: (S-I) = (G-T) + NX. A budget deficit (G>T) can lead to a current account deficit if private saving doesn't rise enough to offset it."}
];

const LS_KEY = "xmba201_macro_study";

function getDefaultState(){
  return {
    topicStats:{},  // {ISMP: {correct:0, total:0}, ...}
    flashcardIndex:0,
    flashcardSeen:[],
    examHistory:[],
    sessionStart: Date.now(),
    lastBreak: Date.now(),
    totalStudyTime:0
  };
}

function loadState(){
  try{
    const s = localStorage.getItem(LS_KEY);
    if(s) return JSON.parse(s);
  }catch(e){}
  return getDefaultState();
}

function saveState(){
  try{localStorage.setItem(LS_KEY, JSON.stringify(state));}catch(e){}
}

let state = loadState();

// Initialize topic stats
Object.keys(TOPICS).forEach(t=>{
  if(!state.topicStats[t]) state.topicStats[t] = {correct:0, total:0};
});

function recordAnswer(topic, correct){
  if(!state.topicStats[topic]) state.topicStats[topic] = {correct:0, total:0};
  state.topicStats[topic].total++;
  if(correct) state.topicStats[topic].correct++;
  saveState();
}

function getTopicAccuracy(topic){
  const s = state.topicStats[topic];
  if(!s || s.total === 0) return 0;
  return Math.round((s.correct / s.total) * 100);
}

function getWeakTopics(){
  return Object.keys(TOPICS).sort((a,b)=> getTopicAccuracy(a) - getTopicAccuracy(b));
}

// Spaced repetition: sort questions to surface weak topics first
function sortByWeakness(arr){
  const weak = getWeakTopics();
  return [...arr].sort((a,b)=> weak.indexOf(a.topic) - weak.indexOf(b.topic));
}

function shuffle(arr){
  const a = [...arr];
  for(let i = a.length-1; i > 0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

let reviewVisited = new Set();

function startReview(){
  reviewVisited = new Set();
  renderReviewList();
}

function renderReviewList(){
  const topicKeys = Object.keys(TOPICS);
  const cards = topicKeys.map((t,i)=>{
    const visited = reviewVisited.has(t);
    const badgeHtml = visited ? '<span class="badge badge-green" style="margin-left:auto">Reviewed</span>' : '';
    return `<div class="card review-topic-card" onclick="renderReviewTopic('${t}')">
      <div class="review-topic-num">${i+1}</div>
      <div style="flex:1">
        <div style="font-weight:600;font-size:.95rem">${TOPICS[t]}</div>
        <div style="font-size:.78rem;color:var(--gray);margin-top:2px">${topicReviews[t].sections.length} sections</div>
      </div>
      ${badgeHtml}
    </div>`;
  }).join('');

  const reviewedCount = reviewVisited.size;
  const totalTopics = topicKeys.length;
  const pct = Math.round(reviewedCount / totalTopics * 100);

  render(`
    <div class="nav-row">
      <button class="back-btn" onclick="renderHome()">← Back</button>
      <span class="question-num">${reviewedCount}/${totalTopics} reviewed</span>
    </div>
    <div class="card" style="text-align:center;padding:16px">
      <h2 style="margin-bottom:4px">Topic Review</h2>
      <p class="subtitle">Read through each model before testing yourself. Tap a topic to dive in.</p>
      <div class="progress-bar" style="margin-top:10px"><div class="progress-fill" style="width:${pct}%;background:var(--green)"></div></div>
    </div>
    ${cards}
    ${reviewedCount === totalTopics ? `<button class="btn btn-primary btn-block" style="margin-top:8px" onclick="startFlashcards()">Ready! Start Flashcards →</button>` : ''}
  `);
}

function renderReviewTopic(topicKey){
  reviewVisited.add(topicKey);
  const review = topicReviews[topicKey];
  const topicKeys = Object.keys(TOPICS);
  const currentIdx = topicKeys.indexOf(topicKey);
  const prevTopic = currentIdx > 0 ? topicKeys[currentIdx - 1] : null;
  const nextTopic = currentIdx < topicKeys.length - 1 ? topicKeys[currentIdx + 1] : null;

  const navDots = topicKeys.map((t,i)=>{
    const isActive = t === topicKey;
    const isVisited = reviewVisited.has(t) && !isActive;
    const cls = isActive ? 'active' : isVisited ? 'visited' : '';
    return `<span class="review-nav-dot ${cls}" onclick="renderReviewTopic('${t}')">${TOPICS[t]}</span>`;
  }).join('');

  const sectionsHtml = review.sections.map(s=>`
    <div class="review-section">
      <div class="review-section-heading">${s.heading}</div>
      <div class="review-section-content">${s.content}</div>
      ${s.diagram ? `<div style="margin:14px 0;text-align:center;overflow-x:auto">${s.diagram}</div>` : ''}
      ${s.example ? `<div style="margin-top:10px;padding:12px 16px;background:#f0f4f8;border-radius:8px;border-left:3px solid var(--accent);font-size:.88rem;line-height:1.6"><strong style="color:var(--accent)">Example:</strong> ${s.example}</div>` : ''}
    </div>
  `).join('');

  render(`
    <div class="nav-row">
      <button class="back-btn" onclick="renderReviewList()">← All Topics</button>
      <span class="question-num">${currentIdx+1} / ${topicKeys.length}</span>
    </div>
    <div class="review-nav">${navDots}</div>
    <div class="card">
      <h2 style="margin-bottom:16px">${review.title}</h2>
      ${sectionsHtml}
    </div>
    <div style="display:flex;gap:10px;margin-top:10px">
      ${prevTopic ? `<button class="btn btn-outline" style="flex:1" onclick="renderReviewTopic('${prevTopic}')">← ${TOPICS[prevTopic]}</button>` : '<div style="flex:1"></div>'}
      ${nextTopic ? `<button class="btn btn-primary" style="flex:1" onclick="renderReviewTopic('${nextTopic}')">${TOPICS[nextTopic]} →</button>` : `<button class="btn btn-green" style="flex:1" onclick="renderReviewList()">Done! ✓</button>`}
    </div>
  `);
  window.scrollTo(0,0);
}

let lqQuestions, lqIndex, lqTimer, lqTimeLeft, lqScore, lqAnswered;

function startLightning(){

      clearInterval(lqTimer);
      renderLightningResults();
    }
  }, 1000);
}

function updateLightningTimer(){
  const bar = document.getElementById('lq-bar');
  const time = document.getElementById('lq-time');
  if(bar) bar.style.width = (lqTimeLeft/60*100)+'%';
  if(bar) bar.className = 'bar-fill' + (lqTimeLeft <= 15 ? ' danger' : lqTimeLeft <= 30 ? ' warning' : '');
  if(time) time.textContent = lqTimeLeft + 's';
}

function renderLightningQ(){
  if(lqIndex >= lqQuestions.length){clearInterval(lqTimer);renderLightningResults();return;}
  lqAnswered = false;
  const q = lqQuestions[lqIndex];
  const optionsHtml = q.options.map((o,i)=>
    `<button class="option-btn" id="lq-opt-${i}" onclick="answerLightning(${i})">${String.fromCharCode(65+i)}. ${o}</button>`
  ).join('');

  render(`
    <div class="nav-row">
      <button class="back-btn" onclick="clearInterval(lqTimer);renderHome()">← Back</button>
      <span class="question-num">Q${lqIndex+1} | Score: ${lqScore}</span>
    </div>
    <div class="timer-bar">
      <span id="lq-time">${lqTimeLeft}s</span>
      <div class="bar"><div class="bar-fill" id="lq-bar" style="width:${lqTimeLeft/60*100}%"></div></div>
    </div>
    <div class="tag">${TOPICS[q.topic]}</div>
    <div class="card">
      <p style="font-size:.95rem;margin-bottom:14px;font-weight:500">${q.q}</p>
      ${optionsHtml}
      <div id="lq-explanation"></div>
    </div>
  `);
}

function answerLightning(idx){
  if(lqAnswered) return;
  lqAnswered = true;
  const q = lqQuestions[lqIndex];
  const correct = idx === q.answer;
  if(correct) lqScore++;
  recordAnswer(q.topic, correct);

  for(let i=0;i<q.options.length;i++){
    const btn = document.getElementById('lq-opt-'+i);
    btn.classList.add('disabled');
    if(i === q.answer) btn.classList.add('correct');
    else if(i === idx && !correct) btn.classList.add('wrong');
  }

  const expClass = correct ? 'correct-exp' : 'wrong-exp';
  document.getElementById('lq-explanation').innerHTML = `<div class="explanation ${expClass}">${correct ? '✓ Correct!' : '✗ Incorrect.'} ${q.why}</div>`;

  setTimeout(()=>{lqIndex++;renderLightningQ();}, correct ? 1200 : 2500);
}

function renderLightningResults(){
  const total = lqIndex;
  const pct = total > 0 ? Math.round(lqScore/total*100) : 0;
  render(`
    <div class="nav-row"><button class="back-btn" onclick="renderHome()">← Back</button></div>
    <div class="card" style="text-align:center">
      <h2>Lightning Quiz Results</h2>
      <div class="score-big">${lqScore}/${total}</div>
      <div class="score-label">${pct}% correct in 60 seconds</div>
      <button class="btn btn-primary" style="margin-top:16px" onclick="startLightning()">Try Again</button>
      <button class="btn btn-outline" style="margin-top:8px" onclick="renderHome()">Back to Menu</button>
    </div>
  `);
}

  `);
  setTimeout(()=>document.getElementById('num-input')?.focus(),100);
}

function checkNum(){
  if(numDone) return;
  numDone = true;
  const q = numQs[numIdx];
  const val = parseFloat(document.getElementById('num-input').value);
  const correct = !isNaN(val) && Math.abs(val - q.answer) <= q.tolerance;
  recordAnswer(q.topic, correct);

  const expClass = correct ? 'correct-exp' : 'wrong-exp';
  document.getElementById('num-explanation').innerHTML = `
    <div class="explanation ${expClass}" style="margin-top:12px">
      ${correct ? '✓ Correct!' : '✗ Incorrect. The answer is '+q.answer+(q.unit?' '+q.unit:'')+'.'} ${q.why}
    </div>
    <button class="btn btn-primary btn-block" style="margin-top:10px" onclick="numIdx++;renderNumQ()">Next</button>
  `;
}

// ============================================================
// MODE 5: POLICY SCENARIO
// ============================================================
let polQs, polIdx, polDone;

function startPolicy(){
  polQs = sortByWeakness(shuffle(policyScenarios));
  polIdx = 0;
  polDone = false;
  renderPolQ();
}

function renderPolQ(){
  if(polIdx >= polQs.length){renderHome();return;}
  polDone = false;
  const q = polQs[polIdx];
  const optHtml = q.options.map((o,i)=>
    `<button class="option-btn" id="pol-opt-${i}" onclick="answerPol(${i})">${String.fromCharCode(65+i)}. ${o}</button>`
  ).join('');

  render(`
    <div class="nav-row">
      <button class="back-btn" onclick="renderHome()">← Back</button>
      <span class="question-num">${polIdx+1} / ${polQs.length}</span>
    </div>
    <div class="tag">${TOPICS[q.topic]}</div>
    <div class="card">
      <div class="scenario-text">${q.scenario}</div>
      <p style="font-size:.95rem;margin-bottom:14px;font-weight:500">${q.question}</p>
      ${optHtml}
      <div id="pol-explanation"></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${(polIdx/polQs.length)*100}%;background:var(--accent)"></div></div>
  `);
}

function answerPol(idx){
  if(polDone) return;
  polDone = true;
  const q = polQs[polIdx];
  const correct = idx === q.answer;
  recordAnswer(q.topic, correct);

  for(let i=0;i<q.options.length;i++){
    const btn = document.getElementById('pol-opt-'+i);
    btn.classList.add('disabled');
    if(i === q.answer) btn.classList.add('correct');
    else if(i === idx && !correct) btn.classList.add('wrong');
  }

  const expClass = correct ? 'correct-exp' : 'wrong-exp';
  document.getElementById('pol-explanation').innerHTML = `
    <div class="explanation ${expClass}">${correct ? '✓ Correct!' : '✗ Incorrect.'} ${q.why}</div>
    <button class="btn btn-primary btn-block" style="margin-top:10px" onclick="polIdx++;renderPolQ()">Next</button>
  `;
}

// ============================================================
// MODE 6: EXAM SIMULATOR
// ============================================================
let examQs, examIdx, examAnswers, examTimer, examTimeLeft, examStarted;

function startExam(){
  examQs = shuffle(examPool).slice(0,25);
  examIdx = 0;
  examAnswers = new Array(25).fill(null);
  examTimeLeft = 90*60;
  examStarted = false;

  render(`
    <div class="nav-row"><button class="back-btn" onclick="renderHome()">← Back</button></div>
    <div class="card" style="text-align:center">
      <h2>Exam Simulator</h2>
      <p style="color:var(--gray);margin-bottom:16px">25 multiple-choice questions. 90-minute timer. Your score will be broken down by topic at the end.</p>
      <button class="btn btn-primary" onclick="beginExam()">Start Exam</button>
    </div>
  `);
}

function beginExam(){
  examStarted = true;
  examTimer = setInterval(()=>{
    examTimeLeft--;
    updateExamTimer();
    if(examTimeLeft <= 0){
      clearInterval(examTimer);
      gradeExam();
    }
  },1000);
  renderExamQ();
}

function updateExamTimer(){
  const el = document.getElementById('exam-timer');
  if(!el) return;
  const m = Math.floor(examTimeLeft/60);
  const s = examTimeLeft%60;
  el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
  el.style.color = examTimeLeft <= 300 ? 'var(--red)' : 'var(--primary)';
}

function renderExamQ(){
  if(examIdx >= examQs.length){gradeExam();return;}
  const q = examQs[examIdx];
  const m = Math.floor(examTimeLeft/60);
  const s = examTimeLeft%60;

  const optHtml = q.options.map((o,i)=>{
    const selected = examAnswers[examIdx] === i ? 'border-color:var(--accent);background:var(--accent-light)' : '';
    return `<button class="option-btn" style="${selected}" onclick="examSelect(${i})">${String.fromCharCode(65+i)}. ${o}</button>`;
  }).join('');

  // Question nav dots
  const dots = examQs.map((_,i)=>{
    const filled = examAnswers[i] !== null;
    const current = i === examIdx;
    const bg = current ? 'var(--accent)' : filled ? 'var(--primary)' : 'var(--gray-light)';
    const border = current ? '2px solid var(--accent)' : 'none';
    return `<div onclick="examIdx=${i};renderExamQ()" style="width:20px;height:20px;border-radius:50%;background:${bg};cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.6rem;color:${filled||current?'#fff':'var(--gray)'};border:${border}">${i+1}</div>`;
  }).join('');

  render(`
    <div class="nav-row">
      <button class="back-btn" onclick="if(confirm('End exam?')){clearInterval(examTimer);renderHome()}">← End Exam</button>
      <span id="exam-timer" style="font-weight:700;font-size:.95rem">${m}:${s.toString().padStart(2,'0')}</span>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px">${dots}</div>
    <div class="tag">${TOPICS[q.topic]}</div>
    <div class="card">
      <p style="font-size:.95rem;margin-bottom:14px;font-weight:500">Q${examIdx+1}. ${q.q}</p>
      ${optHtml}
    </div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-outline" style="flex:1" onclick="examIdx=Math.max(0,examIdx-1);renderExamQ()" ${examIdx===0?'disabled':''}>Previous</button>
      ${examIdx < examQs.length - 1 ?
        `<button class="btn btn-primary" style="flex:1" onclick="examIdx++;renderExamQ()">Next</button>` :
        `<button class="btn btn-green" style="flex:1" onclick="gradeExam()">Submit Exam</button>`
      }
    </div>
  `);
}

function examSelect(idx){
  examAnswers[examIdx] = idx;
  renderExamQ();
}

function gradeExam(){
  clearInterval(examTimer);
  let totalCorrect = 0;
  const topicBreakdown = {};

  examQs.forEach((q,i)=>{
    if(!topicBreakdown[q.topic]) topicBreakdown[q.topic] = {correct:0, total:0};
    topicBreakdown[q.topic].total++;
    const correct = examAnswers[i] === q.answer;
    if(correct){totalCorrect++;topicBreakdown[q.topic].correct++;}
    recordAnswer(q.topic, correct);
  });

  const pct = Math.round(totalCorrect/examQs.length*100);
  const grade = pct >= 93 ? 'A' : pct >= 90 ? 'A-' : pct >= 87 ? 'B+' : pct >= 83 ? 'B' : pct >= 80 ? 'B-' : pct >= 77 ? 'C+' : 'C';
  const gradeColor = pct >= 90 ? 'var(--green)' : pct >= 80 ? 'var(--orange)' : 'var(--red)';

  let topicHtml = Object.keys(topicBreakdown).map(t=>{
    const b = topicBreakdown[t];
    const p = Math.round(b.correct/b.total*100);
    const c = p >= 80 ? 'var(--green)' : p >= 50 ? 'var(--orange)' : 'var(--red)';
    return `<div class="topic-row"><span class="topic-name">${TOPICS[t]}</span><span class="topic-pct" style="color:${c}">${b.correct}/${b.total} (${p}%)</span></div>`;
  }).join('');

  // Review section
  let reviewHtml = examQs.map((q,i)=>{
    const correct = examAnswers[i] === q.answer;
    const yourAnswer = examAnswers[i] !== null ? q.options[examAnswers[i]] : 'Not answered';
    const icon = correct ? '✓' : '✗';
    const color = correct ? 'var(--green)' : 'var(--red)';
    return `<div style="padding:10px 0;border-bottom:1px solid var(--gray-light)">
      <div style="display:flex;gap:8px;align-items:start">
        <span style="color:${color};font-weight:700;font-size:1.1rem">${icon}</span>
        <div>
          <p style="font-size:.88rem;font-weight:500">Q${i+1}. ${q.q}</p>
          <p style="font-size:.82rem;color:var(--gray);margin-top:4px">Your answer: ${yourAnswer}</p>
          ${!correct ? `<p style="font-size:.82rem;color:var(--green);margin-top:2px">Correct: ${q.options[q.answer]}</p>` : ''}
          ${!correct ? `<div class="explanation wrong-exp" style="margin-top:6px;font-size:.82rem">${q.why}</div>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');

  render(`
    <div class="nav-row"><button class="back-btn" onclick="renderHome()">← Back</button></div>
    <div class="card" style="text-align:center">
      <h2>Exam Results</h2>
      <div class="score-big" style="color:${gradeColor}">${totalCorrect}/25</div>
      <div class="score-label">${pct}% — Projected Grade: <strong style="color:${gradeColor}">${grade}</strong></div>
      ${pct >= 90 ? '<p style="margin-top:8px;color:var(--green);font-weight:500">You\'re on track for that A-! Keep it up.</p>' : '<p style="margin-top:8px;color:var(--orange);font-weight:500">Review weak topics below and try again.</p>'}
    </div>
    <div class="card">
      <h2>Score by Topic</h2>
      ${topicHtml}
    </div>
    <div class="card">
      <h2>Full Review</h2>
      ${reviewHtml}
    </div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-primary" style="flex:1" onclick="startExam()">Retake Exam</button>
      <button class="btn btn-outline" style="flex:1" onclick="renderHome()">Back to Menu</button>
    </div>
  `);
}

// ============================================================
// INIT
// ============================================================
renderHome();
</script>
</body>
</html>
