<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XMBA 201 Macroeconomics — Final Exam Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f9fa;--card:#fff;--primary:#1a3a5c;--accent:#2563eb;--accent-light:#dbeafe;--green:#16a34a;--green-light:#dcfce7;--red:#dc2626;--red-light:#fee2e2;--orange:#ea580c;--orange-light:#fff7ed;--gray:#6b7280;--gray-light:#e5e7eb;--text:#1f2937;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.08)}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:16px}
h1{font-size:1.4rem;font-weight:700;color:var(--primary)}
h2{font-size:1.15rem;font-weight:600;color:var(--primary);margin-bottom:12px}
h3{font-size:1rem;font-weight:600}
.subtitle{color:var(--gray);font-size:.85rem;margin-top:2px}
header{text-align:center;padding:20px 0 10px}
.card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:14px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border:none;border-radius:8px;font-family:inherit;font-size:.9rem;font-weight:500;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-outline{background:transparent;border:1.5px solid var(--gray-light);color:var(--text)}.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:6px 14px;font-size:.82rem}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-block{width:100%;margin-top:8px}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.75rem;font-weight:600}
.badge-blue{background:var(--accent-light);color:var(--accent)}
.badge-green{background:var(--green-light);color:var(--green)}
.badge-red{background:var(--red-light);color:var(--red)}
.badge-orange{background:var(--orange-light);color:var(--orange)}
.progress-bar{height:8px;background:var(--gray-light);border-radius:4px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;border-radius:4px;transition:width .3s}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
@media(max-width:600px){.grid-2,.grid-3{grid-template-columns:1fr}}
.mode-card{cursor:pointer;transition:transform .1s,box-shadow .15s;border:2px solid transparent}
.mode-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1);border-color:var(--accent)}
.mode-icon{font-size:1.6rem;margin-bottom:6px}
.mode-label{font-weight:600;font-size:.9rem}
.mode-desc{font-size:.78rem;color:var(--gray);margin-top:2px}
.option-btn{text-align:left;padding:12px 16px;border:1.5px solid var(--gray-light);border-radius:8px;background:var(--card);cursor:pointer;font-family:inherit;font-size:.88rem;width:100%;margin-bottom:8px;transition:all .15s}
.option-btn:hover:not(.disabled){border-color:var(--accent);background:var(--accent-light)}
.option-btn.correct{border-color:var(--green);background:var(--green-light)}
.option-btn.wrong{border-color:var(--red);background:var(--red-light)}
.option-btn.disabled{cursor:default;opacity:.85}
.explanation{padding:12px 16px;border-radius:8px;margin-top:10px;font-size:.88rem;line-height:1.5}
.explanation.correct-exp{background:var(--green-light);border-left:3px solid var(--green)}
.explanation.wrong-exp{background:var(--red-light);border-left:3px solid var(--red)}
.flashcard{min-height:200px;display:flex;align-items:center;justify-content:center;text-align:center;padding:30px;cursor:pointer;user-select:none;position:relative}
.flashcard .label{position:absolute;top:10px;left:14px;font-size:.72rem;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.5px}
.flashcard .content{font-size:1.05rem}
.flashcard .hint{position:absolute;bottom:10px;font-size:.75rem;color:var(--gray)}
.timer-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:.85rem;font-weight:600;color:var(--primary)}
.timer-bar .bar{flex:1;height:6px;background:var(--gray-light);border-radius:3px;overflow:hidden}
.timer-bar .bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.timer-bar .bar-fill.warning{background:var(--orange)}
.timer-bar .bar-fill.danger{background:var(--red)}
.topic-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--gray-light)}
.topic-row:last-child{border-bottom:none}
.topic-name{font-size:.88rem;font-weight:500}
.topic-pct{font-size:.85rem;font-weight:600}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.back-btn{background:none;border:none;font-family:inherit;font-size:.88rem;color:var(--accent);cursor:pointer;font-weight:500;padding:4px 0}
.back-btn:hover{text-decoration:underline}
.question-num{font-size:.82rem;color:var(--gray);font-weight:500}
.input-field{width:100%;padding:10px 14px;border:1.5px solid var(--gray-light);border-radius:8px;font-family:inherit;font-size:.9rem;outline:none;transition:border .15s}
.input-field:focus{border-color:var(--accent)}
.study-plan-step{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--gray-light)}
.study-plan-step:last-child{border-bottom:none}
.step-time{font-weight:700;color:var(--accent);white-space:nowrap;min-width:70px;font-size:.85rem}
.step-info{font-size:.88rem}
.step-info strong{font-weight:600}
.break-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}
.break-modal{background:var(--card);border-radius:16px;padding:30px;text-align:center;max-width:380px;margin:16px}
.break-modal h2{font-size:1.2rem;margin-bottom:8px}
.break-modal p{color:var(--gray);font-size:.9rem;margin-bottom:16px}
.hidden{display:none!important}
.mastery-section{margin-top:16px}
.scenario-text{font-size:.95rem;line-height:1.6;padding:16px;background:#f0f4f8;border-radius:8px;margin-bottom:14px}
.formula-box{font-family:monospace;font-size:.9rem;background:#fffbeb;border:1px solid #f59e0b;border-left:4px solid #f59e0b;border-radius:8px;padding:12px 16px;margin-bottom:10px;color:#92400e;line-height:1.6}
.score-big{font-size:2.5rem;font-weight:700;color:var(--primary)}
.score-label{font-size:.9rem;color:var(--gray)}
.result-topic{margin-bottom:6px}
.tf-btn{flex:1;padding:14px;font-size:1rem;font-weight:600;border-radius:8px;border:2px solid var(--gray-light);background:var(--card);cursor:pointer;transition:all .15s;font-family:inherit}
.tf-btn:hover{border-color:var(--accent)}
.tf-btn.correct{border-color:var(--green);background:var(--green-light)}
.tf-btn.wrong{border-color:var(--red);background:var(--red-light)}
.flex-row{display:flex;gap:10px}
.tag{display:inline-block;padding:2px 8px;background:var(--accent-light);color:var(--accent);border-radius:4px;font-size:.72rem;font-weight:600;margin-bottom:8px}
.review-topic-card{cursor:pointer;transition:transform .1s,box-shadow .15s;border:2px solid transparent;display:flex;align-items:center;gap:14px}
.review-topic-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1);border-color:var(--accent)}
.review-topic-num{width:32px;height:32px;border-radius:50%;background:var(--accent-light);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
.review-section{margin-bottom:20px}
.review-section-heading{font-size:.95rem;font-weight:700;color:var(--primary);margin-bottom:6px;padding-bottom:4px;border-bottom:2px solid var(--accent-light)}
.review-section-content{font-size:.9rem;line-height:1.7;white-space:pre-line;color:var(--text)}
.review-nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.review-nav-dot{padding:4px 10px;border-radius:6px;font-size:.75rem;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-light);background:var(--card);transition:all .15s}
.review-nav-dot:hover{border-color:var(--accent);color:var(--accent)}
.review-nav-dot.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.review-nav-dot.visited{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>

<div class="container" id="app"></div>

<!-- Break Reminder Overlay -->
<div class="break-overlay hidden" id="breakOverlay">
<div class="break-modal">
<h2>Time for a Break!</h2>
<p>You've been studying for 50 minutes. Stand up, stretch, grab some water. Your brain will thank you.</p>
<button class="btn btn-primary" onclick="dismissBreak()">I'm Back, Let's Go</button>
</div>
</div>

<script>
// ============================================================
// DATA: Question Bank (80+ questions across all topics)
// ============================================================
const TOPICS = {
  ISMP: "IS-MP Model",
  ADIA: "AD-IA Model",
  PHILLIPS: "Phillips Curve",
  SOLOW: "Solow Growth",
  MONETARY: "Monetary Policy",
  FISCAL: "Fiscal Policy",
  EXCHANGE: "Exchange Rates",
  INFLATION: "Inflation Expectations",
  OPEN: "Open Economy Macro"
};

// -- Topic Reviews (structured content for each model) --
// SVG helper: creates axis lines with arrow markers
function svgAxes(w,h,xLabel,yLabel,id){
  return `<defs><marker id="arr${id}" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1a3a5c"/></marker></defs>
  <line x1="60" y1="${h-40}" x2="${w-30}" y2="${h-40}" stroke="#1a3a5c" stroke-width="2" marker-end="url(#arr${id})"/>
  <line x1="60" y1="${h-40}" x2="60" y2="20" stroke="#1a3a5c" stroke-width="2" marker-end="url(#arr${id})"/>
  <text x="${w-40}" y="${h-15}" font-size="13" fill="#1a3a5c" font-weight="600">${xLabel}</text>
  <text x="15" y="30" font-size="13" fill="#1a3a5c" font-weight="600">${yLabel}</text>`;
}

const topicReviews = {
  ISMP: {
    title: "IS-MP Model",
    sections: [
      {heading: "Core Idea", content: "The IS-MP model determines short-run output (Y) and the real interest rate (r). It replaces the LM curve with an explicit monetary policy rule, reflecting how modern central banks set interest rates rather than targeting the money supply."},
      {heading: "IS Curve", content: "Shows goods market equilibrium: combinations of Y and r where planned expenditure equals output. Slopes downward because lower r stimulates investment and consumption, raising Y.\n\nKey equation: Y = C(Y-T) + I(r) + G + NX",
        diagram: `<svg viewBox="0 0 420 300" style="max-width:420px;width:100%;font-family:Inter,sans-serif"><defs><marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1a3a5c"/></marker></defs><line x1="60" y1="260" x2="390" y2="260" stroke="#1a3a5c" stroke-width="2" marker-end="url(#a1)"/><line x1="60" y1="260" x2="60" y2="20" stroke="#1a3a5c" stroke-width="2" marker-end="url(#a1)"/><text x="370" y="280" font-size="13" fill="#1a3a5c" font-weight="600">Y (Output)</text><text x="20" y="25" font-size="13" fill="#1a3a5c" font-weight="600">r (real rate)</text><line x1="90" y1="60" x2="350" y2="230" stroke="#2563eb" stroke-width="3"/><text x="340" y="250" font-size="14" fill="#2563eb" font-weight="700">IS</text><line x1="140" y1="60" x2="390" y2="225" stroke="#2563eb" stroke-width="2" stroke-dasharray="8,5" opacity="0.4"/><text x="385" y="218" font-size="12" fill="#2563eb" opacity="0.6">IS'</text><path d="M230,150 L265,148" stroke="#16a34a" stroke-width="2.5" marker-end="url(#a1)"/><text x="235" y="138" font-size="11" fill="#16a34a" font-weight="600">+G or -T</text><text x="100" y="75" font-size="10" fill="#6b7280">High r = low I = low Y</text><text x="230" y="255" font-size="10" fill="#6b7280">Low r = high I = high Y</text></svg>`,
        example: "Congress passes a $500B infrastructure bill (G rises). IS shifts right. At the same interest rate, output is higher because government spending adds directly to aggregate demand."
      },
      {heading: "MP Curve & Equilibrium", content: "The MP curve represents the central bank's reaction function. Upward-sloping: the CB raises r when output rises.\n\nEquilibrium is where IS crosses MP. Fiscal expansion (IS shifts right) raises both Y and r.",
        diagram: `<svg viewBox="0 0 420 310" style="max-width:420px;width:100%;font-family:Inter,sans-serif"><defs><marker id="a2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1a3a5c"/></marker></defs><line x1="60" y1="270" x2="390" y2="270" stroke="#1a3a5c" stroke-width="2" marker-end="url(#a2)"/><line x1="60" y1="270" x2="60" y2="20" stroke="#1a3a5c" stroke-width="2" marker-end="url(#a2)"/><text x="370" y="290" font-size="13" fill="#1a3a5c" font-weight="600">Y</text><text x="20" y="25" font-size="13" fill="#1a3a5c" font-weight="600">r</text><line x1="90" y1="60" x2="320" y2="240" stroke="#2563eb" stroke-width="3"/><text x="315" y="255" font-size="14" fill="#2563eb" font-weight="700">IS</text><line x1="80" y1="220" x2="350" y2="80" stroke="#dc2626" stroke-width="3"/><text x="345" y="75" font-size="14" fill="#dc2626" font-weight="700">MP</text><circle cx="200" cy="153" r="6" fill="#1a3a5c"/><text x="208" y="148" font-size="12" fill="#1a3a5c" font-weight="700">A</text><line x1="200" y1="270" x2="200" y2="159" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/><line x1="60" y1="153" x2="194" y2="153" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/><text x="192" y="288" font-size="11" fill="#1a3a5c">Y*</text><text x="35" y="157" font-size="11" fill="#1a3a5c">r*</text><line x1="140" y1="60" x2="365" y2="235" stroke="#2563eb" stroke-width="2" stroke-dasharray="8,5" opacity="0.5"/><text x="360" y="248" font-size="12" fill="#2563eb" opacity="0.6">IS'</text><circle cx="248" cy="128" r="5" fill="#16a34a"/><text x="255" y="123" font-size="12" fill="#16a34a" font-weight="700">B</text><path d="M207,151 L241,131" stroke="#16a34a" stroke-width="2" stroke-dasharray="3,2" marker-end="url(#a2)"/><rect x="70" y="2" rx="4" width="300" height="18" fill="#f0f4f8"/><text x="80" y="15" font-size="10" fill="#6b7280">Fiscal expansion: IS→IS'. Both Y and r rise (A→B). Partial crowding out.</text></svg>`,
        example: "Starting at equilibrium A (Y*, r*), a tax cut shifts IS to IS'. The economy moves to B: higher output but also a higher interest rate, because the central bank tightens via the MP rule. The rise in r partially offsets the stimulus. This is crowding out."
      },
      {heading: "Key Intuition", content: "Fiscal expansion shifts IS right, raising Y but also r (partial crowding out via the MP curve). The steeper the MP curve (more hawkish central bank), the more crowding out occurs and the less output responds.\n\nMonetary easing shifts MP down, raising Y and lowering r. No crowding out since the central bank is the one acting."}
    ]
  },
  ADIA: {
    title: "AD-IA Model",
    sections: [
      {heading: "Core Idea", content: "The AD-IA framework shows how output and inflation evolve over time. It bridges the short run (IS-MP) to medium-run adjustment. The AD curve comes from IS-MP; the IA line captures inflation persistence."},
      {heading: "The Diagram", content: "AD slopes downward: higher inflation triggers central bank tightening (MP shifts up), reducing Y. The IA line is horizontal at the current inflation rate, reflecting sticky expectations.",
        diagram: `<svg viewBox="0 0 440 310" style="max-width:440px;width:100%;font-family:Inter,sans-serif"><defs><marker id="a3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1a3a5c"/></marker></defs><line x1="60" y1="270" x2="400" y2="270" stroke="#1a3a5c" stroke-width="2" marker-end="url(#a3)"/><line x1="60" y1="270" x2="60" y2="20" stroke="#1a3a5c" stroke-width="2" marker-end="url(#a3)"/><text x="380" y="290" font-size="13" fill="#1a3a5c" font-weight="600">Y</text><text x="15" y="25" font-size="13" fill="#1a3a5c" font-weight="600">\u03C0 (inflation)</text><line x1="100" y1="60" x2="360" y2="235" stroke="#2563eb" stroke-width="3"/><text x="360" y="252" font-size="14" fill="#2563eb" font-weight="700">AD</text><line x1="80" y1="150" x2="380" y2="150" stroke="#ea580c" stroke-width="3"/><text x="383" y="154" font-size="14" fill="#ea580c" font-weight="700">IA</text><line x1="232" y1="270" x2="232" y2="25" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,4"/><text x="222" y="290" font-size="12" fill="#6b7280" font-weight="600">Y*</text><circle cx="232" cy="150" r="6" fill="#1a3a5c"/><text x="240" y="143" font-size="12" fill="#1a3a5c" font-weight="700">LR Equilibrium</text><text x="85" y="170" font-size="10" fill="#ea580c">IA = current \u03C0 (sticky expectations)</text><text x="110" y="78" font-size="10" fill="#2563eb">High \u03C0 \u2192 CB tightens \u2192 low Y</text></svg>`,
        example: "If inflation is at 2% (IA at 2%) and output equals Y*, the economy is in long-run equilibrium. No pressure for change. AD intersects IA right at potential output."
      },
      {heading: "Demand Shocks", content: "Positive demand shock: AD shifts right. Short-run: output rises above Y*, inflation rises. Over time: IA shifts up as expectations adjust, output returns to Y* at higher inflation.\n\nNegative demand shock: AD shifts left. Output falls, inflation gradually declines.",
        diagram: `<svg viewBox="0 0 440 320" style="max-width:440px;width:100%;font-family:Inter,sans-serif"><defs><marker id="a4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1a3a5c"/></marker></defs><line x1="60" y1="280" x2="400" y2="280" stroke="#1a3a5c" stroke-width="2" marker-end="url(#a4)"/><line x1="60" y1="280" x2="60" y2="20" stroke="#1a3a5c" stroke-width="2" marker-end="url(#a4)"/><text x="380" y="300" font-size="13" fill="#1a3a5c" font-weight="600">Y</text><text x="15" y="25" font-size="13" fill="#1a3a5c" font-weight="600">\u03C0</text><line x1="230" y1="280" x2="230" y2="30" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,4"/><text x="220" y="298" font-size="11" fill="#6b7280" font-weight="600">Y*</text><line x1="100" y1="65" x2="340" y2="245" stroke="#2563eb" stroke-width="2" opacity="0.4"/><text x="335" y="260" font-size="11" fill="#2563eb" opacity="0.5">AD</text><line x1="150" y1="65" x2="390" y2="245" stroke="#2563eb" stroke-width="3"/><text x="385" y="255" font-size="13" fill="#2563eb" font-weight="700">AD'</text><line x1="80" y1="160" x2="380" y2="160" stroke="#ea580c" stroke-width="2"/><text x="383" y="164" font-size="12" fill="#ea580c">IA</text><line x1="80" y1="125" x2="380" y2="125" stroke="#ea580c" stroke-width="2" stroke-dasharray="6,4"/><text x="383" y="129" font-size="12" fill="#ea580c">IA' (later)</text><circle cx="230" cy="160" r="5" fill="#1a3a5c"/><text x="212" y="178" font-size="11" fill="#1a3a5c" font-weight="600">A</text><circle cx="282" cy="160" r="5" fill="#16a34a"/><text x="288" y="155" font-size="11" fill="#16a34a" font-weight="600">B (SR)</text><circle cx="230" cy="125" r="5" fill="#dc2626"/><text x="198" y="118" font-size="11" fill="#dc2626" font-weight="600">C (LR)</text><path d="M236,158 L275,158" stroke="#16a34a" stroke-width="2" marker-end="url(#a4)"/><path d="M278,155 L238,130" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#a4)"/><rect x="60" y="2" rx="4" width="350" height="16" fill="#f0f4f8"/><text x="70" y="13" font-size="10" fill="#6b7280">A\u2192B: stimulus raises Y above Y*. B\u2192C: inflation expectations rise, Y returns to Y*</text></svg>`,
        example: "Massive COVID stimulus (2020-21): AD shifted right. Short-run (B): GDP recovered fast, inflation rose to 7%+. Over 2022-23, expectations started rising (IA shifted up). The Fed had to tighten aggressively to prevent landing at a permanently higher inflation equilibrium."
      },
      {heading: "Supply Shocks", content: "Negative supply shock (oil spike): IA shifts up. Stagflation: higher inflation AND lower output. The central bank faces a dilemma: tighten to fight inflation (deeper recession) or accommodate (risk embedding expectations).\n\nPositive supply shock: IA shifts down. Lower inflation, higher output. The easy case.",
        example: "2022 energy crisis: Russia-Ukraine war spiked oil prices. IA shifted up. Inflation hit 9% while growth slowed. The ECB and Fed both chose to tighten, accepting some output cost to prevent expectations from unanchoring. A textbook stagflation dilemma."
      },
      {heading: "Key Intuition", content: "Demand shocks move the economy along the IA line in the short run; supply shocks shift the IA line itself. The economy self-corrects over time as inflation expectations adjust, but the speed depends on central bank credibility and how quickly expectations adapt."}
    ]
  },
  PHILLIPS: {
    title: "Phillips Curve",
    sections: [
      {heading: "Core Equation", content: "pi = pi_e - beta(u - u_n) + v\n\npi = actual inflation\npi_e = expected inflation\nu = actual unemployment\nu_n = natural rate (NAIRU)\nbeta = slope (sensitivity of inflation to labor market slack)\nv = supply shock term"},
      {heading: "The Diagram", content: "The short-run Phillips Curve (SRPC) slopes downward: lower unemployment comes with higher inflation. The long-run Phillips Curve (LRPC) is vertical at the natural rate. When expectations rise, the entire SRPC shifts up.",
        diagram: `<svg viewBox="0 0 440 310" style="max-width:440px;width:100%;font-family:Inter,sans-serif"><defs><marker id="a5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1a3a5c"/></marker></defs><line x1="60" y1="270" x2="400" y2="270" stroke="#1a3a5c" stroke-width="2" marker-end="url(#a5)"/><line x1="60" y1="270" x2="60" y2="20" stroke="#1a3a5c" stroke-width="2" marker-end="url(#a5)"/><text x="355" y="295" font-size="13" fill="#1a3a5c" font-weight="600">u (unemp.)</text><text x="15" y="25" font-size="13" fill="#1a3a5c" font-weight="600">\u03C0</text><line x1="230" y1="270" x2="230" y2="40" stroke="#dc2626" stroke-width="3"/><text x="234" y="38" font-size="13" fill="#dc2626" font-weight="700">LRPC</text><text x="234" y="55" font-size="10" fill="#dc2626">(at u_n = 5%)</text><path d="M100,100 Q200,155 370,195" stroke="#2563eb" stroke-width="3" fill="none"/><text x="372" y="192" font-size="13" fill="#2563eb" font-weight="700">SRPC</text><text x="372" y="208" font-size="10" fill="#2563eb">(\u03C0_e = 2%)</text><path d="M100,60 Q200,115 370,155" stroke="#2563eb" stroke-width="2" fill="none" stroke-dasharray="8,5" opacity="0.4"/><text x="372" y="152" font-size="11" fill="#2563eb" opacity="0.5">SRPC'</text><text x="372" y="167" font-size="10" fill="#2563eb" opacity="0.5">(\u03C0_e = 4%)</text><circle cx="230" cy="155" r="5" fill="#1a3a5c"/><text x="238" y="150" font-size="11" fill="#1a3a5c" font-weight="600">LR Eq</text><rect x="88" y="225" rx="4" width="115" height="28" fill="#dbeafe"/><text x="98" y="244" font-size="10" fill="#2563eb" font-weight="600">u &lt; u_n \u2192 \u03C0 rises</text><rect x="268" y="225" rx="4" width="115" height="28" fill="#fee2e2"/><text x="278" y="244" font-size="10" fill="#dc2626" font-weight="600">u &gt; u_n \u2192 \u03C0 falls</text></svg>`,
        example: "NAIRU = 5%, unemployment drops to 3% (overheating), beta = 0.5, pi_e = 2%:\npi = 2 - 0.5(3-5) = 2 + 1 = 3%. Inflation rises 1 point above expectations. If this persists, expectations shift to 3% and the SRPC shifts up."
      },
      {heading: "Sacrifice Ratio", content: "The cumulative output (or unemployment) cost of reducing inflation by 1 percentage point. With adaptive expectations and slow adjustment, the sacrifice ratio is high. With credible policy and rational expectations, it can be lower.",
        example: "Volcker disinflation (1980-83): to cut inflation from ~10% to ~4% (6 points), unemployment rose to 10.8% for ~3 years. Sacrifice ratio was roughly 2.5: for each 1% drop in inflation, ~2.5% of GDP was lost. A more credible announcement could have lowered the cost if expectations adjusted faster."
      },
      {heading: "Key Intuition", content: "u < u_n: inflation rises above expectations (overheating).\nu > u_n: inflation falls below expectations (slack).\nu = u_n: inflation equals expectations (stable).\n\nThe Phillips Curve is the mechanism through which output gaps translate into inflation changes in the AD-IA model."}
    ]
  },
  SOLOW: {
    title: "Solow Growth Model",
    sections: [
      {heading: "Core Equations", content: "Production: Y = A * K^alpha * L^(1-alpha)\n\nPer worker: y = A * k^alpha, where k = K/L\n\nCapital accumulation: dk = sy - (n + delta)k\n\nSteady state: sy* = (n + delta)k*"},
      {heading: "The Solow Diagram", content: "Investment (sy) is a concave curve. Break-even investment (n+delta)k is a straight line. Where they cross is the steady state k*. Below k*: investment exceeds depreciation, so k grows. Above k*: depreciation exceeds investment, so k shrinks.",
        diagram: `<svg viewBox="0 0 440 310" style="max-width:440px;width:100%;font-family:Inter,sans-serif"><defs><marker id="a6" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1a3a5c"/></marker></defs><line x1="60" y1="270" x2="400" y2="270" stroke="#1a3a5c" stroke-width="2" marker-end="url(#a6)"/><line x1="60" y1="270" x2="60" y2="20" stroke="#1a3a5c" stroke-width="2" marker-end="url(#a6)"/><text x="345" y="295" font-size="13" fill="#1a3a5c" font-weight="600">k (capital/worker)</text><text x="8" y="30" font-size="11" fill="#1a3a5c" font-weight="600">investment,</text><text x="8" y="44" font-size="11" fill="#1a3a5c" font-weight="600">depreciation</text><line x1="60" y1="270" x2="380" y2="80" stroke="#dc2626" stroke-width="2.5"/><text x="365" y="72" font-size="12" fill="#dc2626" font-weight="700">(n+\u03B4)k</text><text x="350" y="88" font-size="10" fill="#dc2626">break-even</text><path d="M60,270 Q180,80 380,130" stroke="#2563eb" stroke-width="3" fill="none"/><text x="385" y="128" font-size="12" fill="#2563eb" font-weight="700">sf(k)</text><text x="385" y="144" font-size="10" fill="#2563eb">investment</text><circle cx="248" cy="170" r="6" fill="#1a3a5c"/><line x1="248" y1="270" x2="248" y2="176" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/><text x="240" y="290" font-size="12" fill="#1a3a5c" font-weight="700">k*</text><text x="256" y="166" font-size="11" fill="#1a3a5c" font-weight="700">Steady state</text><rect x="95" y="210" rx="4" width="95" height="40" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/><text x="105" y="228" font-size="10" fill="#16a34a" font-weight="600">k &lt; k*</text><text x="105" y="242" font-size="9" fill="#16a34a">sf(k) &gt; (n+\u03B4)k \u2192 grows</text><rect x="290" y="108" rx="4" width="95" height="40" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/><text x="300" y="126" font-size="10" fill="#dc2626" font-weight="600">k &gt; k*</text><text x="300" y="140" font-size="9" fill="#dc2626">sf(k) &lt; (n+\u03B4)k \u2192 shrinks</text></svg>`,
        example: "Y = K^0.5 * L^0.5, s = 0.3, delta = 0.1, n = 0:\nSteady state: 0.3*k^0.5 = 0.1k, so k^0.5 = 3, k* = 9, y* = 3.\nIf the country currently has k = 4 (below steady state), investment exceeds depreciation, so k grows. Growth is fast at first, slows as k approaches 9."
      },
      {heading: "Convergence & Technology", content: "Countries below steady state grow faster (high MPK). This predicts conditional convergence.\n\nOnly TFP growth (A) drives sustained per-capita growth. Capital accumulation alone hits diminishing returns.",
        example: "China (1980s-2010s): started far below steady state with low k. Massive investment yielded 10%+ growth. As k rose and MPK fell, growth naturally slowed toward 5-6%. The US, near its steady state, grows at ~2% (driven mainly by TFP). This is convergence in action."
      },
      {heading: "Golden Rule", content: "The saving rate that maximizes steady-state consumption per worker. At the Golden Rule k: MPK = delta + n. Consumption is maximized when the marginal product of capital equals the break-even rate.",
        example: "If delta = 0.05 and n = 0.02, the Golden Rule requires MPK = 0.07. If MPK is currently 0.12 (below Golden Rule k), increasing the saving rate would raise both capital and long-run consumption. If MPK = 0.03, the economy is over-saving: cutting s would increase consumption."
      },
      {heading: "Key Intuition", content: "Saving and investment determine the level of income, not the growth rate. Only technology improvements generate permanent per-capita growth. This is why policy focus on innovation and institutions matters more for long-run prosperity than simply raising the saving rate."}
    ]
  },
  MONETARY: {
    title: "Monetary Policy",
    sections: [
      {heading: "Transmission Mechanism", content: "Central bank changes policy rate, which affects market interest rates, asset prices, exchange rates, and credit conditions. These channels influence consumption, investment, net exports, and ultimately output and inflation. Lags are long and variable (12-18 months).",
        diagram: `<svg viewBox="0 0 460 200" style="max-width:460px;width:100%;font-family:Inter,sans-serif"><defs><marker id="a7" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1a3a5c"/></marker></defs><rect x="5" y="70" rx="8" width="85" height="50" fill="#1a3a5c"/><text x="14" y="90" font-size="10" fill="#fff" font-weight="600">Central Bank</text><text x="14" y="105" font-size="10" fill="#dbeafe">cuts rate</text><line x1="90" y1="85" x2="118" y2="50" stroke="#2563eb" stroke-width="2" marker-end="url(#a7)"/><line x1="90" y1="95" x2="118" y2="95" stroke="#2563eb" stroke-width="2" marker-end="url(#a7)"/><line x1="90" y1="105" x2="118" y2="140" stroke="#2563eb" stroke-width="2" marker-end="url(#a7)"/><rect x="120" y="28" rx="6" width="100" height="38" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/><text x="130" y="44" font-size="10" fill="#2563eb" font-weight="600">Lower rates</text><text x="130" y="58" font-size="9" fill="#2563eb">+ Asset prices \u2191</text><rect x="120" y="73" rx="6" width="100" height="38" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/><text x="130" y="89" font-size="10" fill="#2563eb" font-weight="600">Currency</text><text x="130" y="103" font-size="9" fill="#2563eb">depreciates</text><rect x="120" y="118" rx="6" width="100" height="38" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/><text x="130" y="134" font-size="10" fill="#2563eb" font-weight="600">Easier credit</text><text x="130" y="148" font-size="9" fill="#2563eb">conditions</text><line x1="220" y1="47" x2="255" y2="77" stroke="#16a34a" stroke-width="1.5" marker-end="url(#a7)"/><line x1="220" y1="92" x2="255" y2="92" stroke="#16a34a" stroke-width="1.5" marker-end="url(#a7)"/><line x1="220" y1="137" x2="255" y2="107" stroke="#16a34a" stroke-width="1.5" marker-end="url(#a7)"/><rect x="258" y="65" rx="6" width="80" height="50" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="268" y="84" font-size="10" fill="#16a34a" font-weight="600">C\u2191 I\u2191 NX\u2191</text><text x="268" y="100" font-size="9" fill="#16a34a">Spending rises</text><line x1="338" y1="90" x2="365" y2="90" stroke="#1a3a5c" stroke-width="2" marker-end="url(#a7)"/><rect x="368" y="65" rx="6" width="80" height="50" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/><text x="378" y="84" font-size="10" fill="#ea580c" font-weight="600">Y\u2191 \u03C0\u2191</text><text x="378" y="100" font-size="9" fill="#ea580c">Output &amp;</text><text x="378" y="112" font-size="9" fill="#ea580c">inflation up</text><text x="100" y="185" font-size="10" fill="#6b7280">Full effect takes 12-18 months to reach output and inflation</text></svg>`,
        example: "March 2020: Fed cut rates to 0% and launched QE. Lower mortgage rates boosted housing (I up). Lower corporate borrowing costs supported business investment. Dollar depreciation helped exporters. Combined effect showed up in GDP by late 2020."
      },
      {heading: "Taylor Rule", content: "i = r* + pi + 0.5(pi - pi*) + 0.5(Y - Y*)/Y*\n\nPrescribes the nominal interest rate based on the neutral real rate (~2%), inflation deviation from target, and the output gap. Weights of 0.5 are benchmarks.",
        example: "r* = 2%, pi = 5%, pi* = 2%, output gap = 2%:\ni = 2 + 5 + 0.5(5-2) + 0.5(2) = 2 + 5 + 1.5 + 1 = 9.5%\nReal rate = 9.5 - 5 = 4.5%, well above neutral. Both inflation and output are running hot, so the rule prescribes aggressive tightening."
      },
      {heading: "Zero Lower Bound & QE", content: "Nominal rates can't go below zero. At the ZLB, conventional cuts are exhausted. QE: central bank purchases long-term assets to lower long-term yields, boost asset prices, and signal easy policy commitment.",
        diagram: `<svg viewBox="0 0 440 160" style="max-width:440px;width:100%;font-family:Inter,sans-serif"><rect x="10" y="10" rx="8" width="195" height="75" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/><text x="25" y="30" font-size="11" fill="#dc2626" font-weight="700">Conventional (broken)</text><text x="25" y="48" font-size="10" fill="#dc2626">Policy rate at 0%. Can't cut further.</text><text x="25" y="64" font-size="10" fill="#dc2626">Economy still in recession.</text><text x="25" y="78" font-size="10" fill="#dc2626">Standard tools exhausted.</text><text x="218" y="48" font-size="22" fill="#1a3a5c" font-weight="700">\u2192</text><rect x="245" y="10" rx="8" width="185" height="75" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="260" y="30" font-size="11" fill="#16a34a" font-weight="700">Unconventional tools</text><text x="260" y="48" font-size="10" fill="#16a34a">QE: buy long-term bonds</text><text x="260" y="64" font-size="10" fill="#16a34a">Forward guidance</text><text x="260" y="78" font-size="10" fill="#16a34a">Yield curve control</text><text x="10" y="110" font-size="11" fill="#1a3a5c" font-weight="600">Key insight: fiscal multipliers are LARGER at ZLB</text><text x="10" y="128" font-size="10" fill="#6b7280">Normal: fiscal stimulus \u2192 CB raises rates \u2192 crowding out</text><text x="10" y="144" font-size="10" fill="#6b7280">At ZLB: fiscal stimulus \u2192 rates can't rise \u2192 full multiplier effect</text></svg>`,
        example: "After 2008: Fed at ~0% by December. Three QE rounds (2009-2014) purchased ~$3.5T in bonds, pushing 10-year yields from ~3.5% to ~1.5%, supporting housing and equity recovery."
      },
      {heading: "Credibility", content: "A credible central bank anchors inflation expectations, reducing the sacrifice ratio. Credibility is built through consistent action matching stated targets. Loss of credibility triggers unanchored expectations and wage-price spirals.",
        example: "Volcker (1979-82): inherited zero credibility. Raised rates to 20%, causing deep recession. Once credibility was established, expectations dropped and inflation stayed low for 40 years. Credibility is expensive to build but cheap to maintain."
      },
      {heading: "Key Intuition", content: "Monetary policy is the primary tool for demand management. Effectiveness depends on credibility, transmission health, and whether the ZLB binds. At the ZLB, fiscal policy becomes relatively more important."}
    ]
  },
  FISCAL: {
    title: "Fiscal Policy",
    sections: [
      {heading: "The Multiplier", content: "Government spending multiplier = 1/(1 - MPC)\nTax multiplier = -MPC/(1 - MPC)\nBalanced-budget multiplier = 1\n\nIn practice, multipliers are 0.8-1.5 due to crowding out, imports, and monetary offset. Larger at the ZLB and during recessions.",
        diagram: `<svg viewBox="0 0 440 210" style="max-width:440px;width:100%;font-family:Inter,sans-serif"><text x="10" y="18" font-size="12" fill="#1a3a5c" font-weight="700">Multiplier Effect: Gov't spends $100, MPC = 0.8</text><rect x="10" y="30" rx="6" width="80" height="32" fill="#1a3a5c"/><text x="18" y="44" font-size="10" fill="#fff" font-weight="600">Round 1</text><text x="18" y="56" font-size="10" fill="#dbeafe">+$100</text><text x="95" y="50" font-size="14" fill="#6b7280">\u2192</text><rect x="108" y="30" rx="6" width="80" height="32" fill="#2563eb"/><text x="116" y="44" font-size="10" fill="#fff" font-weight="600">Round 2</text><text x="116" y="56" font-size="10" fill="#dbeafe">+$80</text><text x="193" y="50" font-size="14" fill="#6b7280">\u2192</text><rect x="206" y="30" rx="6" width="80" height="32" fill="#2563eb" opacity="0.8"/><text x="214" y="44" font-size="10" fill="#fff" font-weight="600">Round 3</text><text x="214" y="56" font-size="10" fill="#dbeafe">+$64</text><text x="291" y="50" font-size="14" fill="#6b7280">\u2192</text><rect x="304" y="30" rx="6" width="80" height="32" fill="#2563eb" opacity="0.6"/><text x="312" y="44" font-size="10" fill="#fff" font-weight="600">Round 4</text><text x="312" y="56" font-size="10" fill="#dbeafe">+$51</text><text x="390" y="50" font-size="14" fill="#6b7280">...</text><rect x="10" y="75" rx="8" width="420" height="32" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="25" y="95" font-size="13" fill="#16a34a" font-weight="700">Total = $100 / (1 - 0.8) = $500 | Multiplier = 5</text><text x="10" y="130" font-size="11" fill="#1a3a5c" font-weight="600">In practice, multiplier is smaller (0.8-1.5):</text><text x="10" y="148" font-size="10" fill="#6b7280">\u2022 Some spending goes to imports (leakage) \u2022 CB may raise rates (crowding out)</text><text x="10" y="165" font-size="10" fill="#6b7280">\u2022 Some consumers save the windfall (Ricardian behavior)</text><text x="10" y="190" font-size="11" fill="#16a34a" font-weight="600">Exception: at ZLB, multiplier can exceed 1.5 (no monetary offset)</text></svg>`,
        example: "COVID relief (2020): ~$2.2T CARES Act. Estimated multiplier of ~1.0-1.5, generating $2.2-3.3T in GDP support. Multiplier was high because: (1) Fed at ZLB, no offset, (2) massive slack, (3) direct payments targeted liquidity-constrained households."
      },
      {heading: "Automatic Stabilizers", content: "Fiscal mechanisms that automatically dampen cycles without new legislation: progressive income taxes, unemployment insurance, welfare programs. They reduce cycle amplitude but can't eliminate recessions.",
        example: "During 2020, unemployment insurance spending automatically surged from ~$26B to ~$500B annually. Tax revenue fell as incomes dropped. This cushioned household income without any new legislation."
      },
      {heading: "Crowding Out", content: "Government borrowing competes for loanable funds, pushing up interest rates and reducing private investment. Stronger near full capacity. At the ZLB, crowding out is minimal. Fiscal stimulus may even 'crowd in' private investment by boosting demand and confidence.",
        example: "Normal times: Gov't borrows $100B. Bond yields rise, business borrowing costs up, private investment falls ~$30B. Net stimulus = $70B.\nAt ZLB (2009): Gov't borrows $100B. Rates pinned at zero. Full $100B flows through. Businesses see demand rising and invest more."
      },
      {heading: "Ricardian Equivalence & Deficits", content: "Theory: consumers anticipate future taxes, so they save tax cuts rather than spend. In practice, fails when consumers are liquidity-constrained or myopic.\n\nStructural deficit: at potential output (underlying stance). Cyclical deficit: from automatic stabilizers. Policy evaluation should focus on the structural deficit.",
        example: "US deficit in 2020: ~15% of GDP. Structural deficit was ~5% (existed pre-COVID). The other ~10% was cyclical: automatic stabilizers. Judging fiscal sustainability by total deficit alone would be misleading."
      },
      {heading: "Key Intuition", content: "Fiscal policy is most effective when monetary policy is constrained (ZLB), the economy has slack, and crowding out is limited. Countercyclical fiscal policy means expanding in recessions and consolidating in booms. Procyclical fiscal policy amplifies instability."}
    ]
  },
  EXCHANGE: {
    title: "Exchange Rates",
    sections: [
      {heading: "Interest Rate Parity", content: "Uncovered Interest Parity: i_domestic - i_foreign = expected depreciation of domestic currency.\n\nIf US rates exceed EU rates by 3%, the dollar is expected to depreciate by 3% to equalize returns.",
        diagram: `<svg viewBox="0 0 440 170" style="max-width:440px;width:100%;font-family:Inter,sans-serif"><rect x="10" y="10" rx="8" width="195" height="65" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/><text x="25" y="30" font-size="11" fill="#2563eb" font-weight="700">US Bond: 5% yield</text><text x="25" y="48" font-size="10" fill="#2563eb">Invest $100 \u2192 get $105</text><text x="25" y="64" font-size="10" fill="#2563eb">But dollar depreciates 3%...</text><rect x="235" y="10" rx="8" width="195" height="65" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="250" y="30" font-size="11" fill="#16a34a" font-weight="700">EU Bond: 2% yield</text><text x="250" y="48" font-size="10" fill="#16a34a">Invest \u20AC100 \u2192 get \u20AC102</text><text x="250" y="64" font-size="10" fill="#16a34a">Euro appreciates 3%...</text><rect x="80" y="88" rx="8" width="280" height="30" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/><text x="100" y="108" font-size="12" fill="#ea580c" font-weight="700">Returns equalize: both \u2248 2% in common currency</text><text x="10" y="145" font-size="10" fill="#6b7280">Higher-yield currencies are expected to depreciate. Carry trades (borrow low, invest high)</text><text x="10" y="160" font-size="10" fill="#6b7280">earn the spread but risk getting wiped out by exchange rate moves.</text></svg>`,
        example: "Japan rate = 0%, US rate = 5%. UIP predicts the dollar should depreciate ~5%/year vs. yen. An investor borrowing in yen to buy US bonds earns 5% interest but expects to lose 5% on the exchange rate. Net expected return: 0%."
      },
      {heading: "J-Curve Effect", content: "After depreciation, the trade balance initially worsens before improving. Import costs rise immediately (contracts pre-set in foreign currency) while export volumes take time to adjust. Typically 6-18 months for full effect.",
        diagram: `<svg viewBox="0 0 440 200" style="max-width:440px;width:100%;font-family:Inter,sans-serif"><defs><marker id="a8" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1a3a5c"/></marker></defs><line x1="60" y1="120" x2="410" y2="120" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/><text x="415" y="124" font-size="10" fill="#6b7280">0</text><line x1="60" y1="180" x2="410" y2="180" stroke="#1a3a5c" stroke-width="2" marker-end="url(#a8)"/><line x1="60" y1="180" x2="60" y2="20" stroke="#1a3a5c" stroke-width="2" marker-end="url(#a8)"/><text x="385" y="198" font-size="12" fill="#1a3a5c" font-weight="600">Time</text><text x="8" y="25" font-size="11" fill="#1a3a5c" font-weight="600">Trade Bal.</text><line x1="140" y1="180" x2="140" y2="35" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="5,3"/><text x="118" y="198" font-size="10" fill="#ea580c" font-weight="600">Depreciation</text><path d="M60,110 L140,110 Q168,160 205,145 Q295,90 400,60" stroke="#2563eb" stroke-width="3" fill="none"/><text x="148" y="165" font-size="10" fill="#dc2626" font-weight="600">Worsens first</text><text x="280" y="72" font-size="10" fill="#16a34a" font-weight="600">Then improves</text><text x="330" y="52" font-size="13" fill="#2563eb" font-weight="700">J</text><text x="70" y="45" font-size="10" fill="#6b7280">6-18 months to full effect</text></svg>`,
        example: "After Brexit (2016), the pound fell ~15%. UK imports immediately became more expensive (oil, components in dollars). Trade deficit initially widened. Over the next 12-18 months, UK exports became competitive, tourism boomed. Trade balance gradually improved, tracing the J shape."
      },
      {heading: "PPP & Fixed vs. Floating", content: "PPP (long-run): exchange rates adjust so identical goods cost the same across countries. Relative PPP: depreciation rate = inflation differential.\n\nFixed rates: stability but no independent monetary policy. Floating: policy independence but volatility.",

const flashcards = [
  {topic:"ISMP",front:"What does the IS curve represent?",back:"The IS curve shows combinations of output (Y) and the real interest rate (r) where the goods market is in equilibrium. It slopes downward: lower r stimulates investment and consumption, raising Y."},
  {topic:"ISMP",front:"What does the MP curve represent?",back:"The MP curve represents the central bank's monetary policy rule, showing how it sets the real interest rate as a function of economic conditions (inflation, output gap). It is typically upward-sloping or flat."},
  {topic:"ISMP",front:"What shifts the IS curve right?",back:"Expansionary fiscal policy (higher G or lower T), increased consumer/business confidence, a wealth effect from rising asset prices, or stronger foreign demand for exports."},
  {topic:"ADIA",front:"What is the AD curve in the AD-IA framework?",back:"The AD curve shows the negative relationship between inflation and output, derived from the IS-MP model. Higher inflation leads the central bank to raise r (via MP), which reduces Y along the IS curve."},
  {topic:"ADIA",front:"What is the IA (Inflation Adjustment) line?",back:"The IA line is a horizontal line at the current inflation rate, reflecting adaptive inflation expectations. It shifts up when inflation expectations rise and down when they fall. It captures inflation persistence."},
  {topic:"ADIA",front:"How does a negative demand shock appear in AD-IA?",back:"The AD curve shifts left, moving the economy to a point below potential output. Inflation initially stays on the IA line but gradually falls as the output gap persists, shifting IA downward over time."},
  {topic:"PHILLIPS",front:"State the expectations-augmented Phillips Curve.",back:"pi = pi_e - beta(u - u_n) + v, where pi is inflation, pi_e is expected inflation, u is unemployment, u_n is the natural rate, beta > 0, and v represents supply shocks."},
  {topic:"PHILLIPS",front:"What is the sacrifice ratio?",back:"The sacrifice ratio is the cumulative percentage of GDP that must be forgone to reduce inflation by 1 percentage point. It measures the real cost of disinflation and depends on how quickly expectations adjust."},
  {topic:"SOLOW",front:"What are the key equations of the Solow model?",back:"Y = F(K,L) (production function), capital accumulation: dK = sY - deltaK. In steady state, sY* = deltaK*, meaning investment equals depreciation. Per-worker: y = f(k), dk = sy - (n+delta)k."},
  {topic:"SOLOW",front:"What causes long-run growth in the Solow model?",back:"In the basic Solow model, only technological progress (TFP growth) drives sustained per-capita growth. Capital accumulation alone leads to a steady state due to diminishing returns."},
  {topic:"SOLOW",front:"What is the Golden Rule level of capital?",back:"The capital stock that maximizes steady-state consumption. It occurs where MPK = delta + n (marginal product of capital equals depreciation rate plus population growth). Saving rate is set so s*f(k) = (n+delta)k at that k."},
  {topic:"MONETARY",front:"How does monetary policy transmit through the economy?",back:"Central bank lowers/raises policy rate, which affects market interest rates, asset prices, exchange rates, and credit conditions. These channels influence consumption, investment, net exports, and ultimately output and inflation."},
  {topic:"MONETARY",front:"What is the Taylor Rule?",back:"r = r* + 0.5(pi - pi*) + 0.5(Y - Y*)/Y*, where r* is the neutral real rate, pi* is the inflation target. It prescribes rate adjustments based on deviations of inflation and output from targets."},
  {topic:"FISCAL",front:"What is the government spending multiplier?",back:"In a simple Keynesian model, the multiplier is 1/(1 - MPC). If MPC = 0.8, multiplier = 5. In practice it's smaller due to crowding out, imports, and monetary policy offset. Typically estimated at 0.8 to 1.5."},
  {topic:"FISCAL",front:"What is Ricardian Equivalence?",back:"The theory that consumers, anticipating future taxes to repay government debt, increase saving to offset fiscal stimulus. If true, tax cuts have no effect on demand. In practice, it's a theoretical benchmark; liquidity constraints and myopia weaken it."},
  {topic:"EXCHANGE",front:"What is the interest rate parity condition?",back:"Uncovered interest parity: i_domestic - i_foreign = expected depreciation of domestic currency. If US rates exceed EU rates, the dollar is expected to depreciate to equalize returns on comparable assets."},
  {topic:"EXCHANGE",front:"How does a currency depreciation affect the economy?",back:"Exports become cheaper (boosting demand), imports become more expensive (reducing demand for imports, raising domestic prices). Net exports improve (with a J-curve lag). It's expansionary but can be inflationary."},

    if(s) return JSON.parse(s);

  return getDefaultState();
}

  try{localStorage.setItem(LS_KEY, JSON.stringify(state));}catch(e){}
}

Object.keys(TOPICS).forEach(t=>{
  if(!state.topicStats[t]) state.topicStats[t] = {correct:0, total:0};
});

function recordAnswer(topic, correct){
  if(!state.topicStats[topic]) state.topicStats[topic] = {correct:0, total:0};
  state.topicStats[topic].total++;
  if(correct) state.topicStats[topic].correct++;
  saveState();
}

function getTopicAccuracy(topic){
  const s = state.topicStats[topic];
  if(!s || s.total === 0) return 0;
  return Math.round((s.correct / s.total) * 100);
}

function getWeakTopics(){
  return Object.keys(TOPICS).sort((a,b)=> getTopicAccuracy(a) - getTopicAccuracy(b));
}

// Spaced repetition: sort questions to surface weak topics first
function sortByWeakness(arr){
  const weak = getWeakTopics();
  return [...arr].sort((a,b)=> weak.indexOf(a.topic) - weak.indexOf(b.topic));
}

function shuffle(arr){
  const a = [...arr];
  for(let i = a.length-1; i > 0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

}

let reviewVisited = new Set();

function startReview(){
  reviewVisited = new Set();
  renderReviewList();
}

function renderReviewList(){
  const topicKeys = Object.keys(TOPICS);
  const cards = topicKeys.map((t,i)=>{
    const visited = reviewVisited.has(t);
    const badgeHtml = visited ? '<span class="badge badge-green" style="margin-left:auto">Reviewed</span>' : '';
    return `<div class="card review-topic-card" onclick="renderReviewTopic('${t}')">
      <div class="review-topic-num">${i+1}</div>
      <div style="flex:1">
        <div style="font-weight:600;font-size:.95rem">${TOPICS[t]}</div>
        <div style="font-size:.78rem;color:var(--gray);margin-top:2px">${topicReviews[t].sections.length} sections</div>
      </div>
      ${badgeHtml}
    </div>`;
  }).join('');

  const reviewedCount = reviewVisited.size;
  const totalTopics = topicKeys.length;
  const pct = Math.round(reviewedCount / totalTopics * 100);

  render(`
    <div class="nav-row">
      <button class="back-btn" onclick="renderHome()">← Back</button>
      <span class="question-num">${reviewedCount}/${totalTopics} reviewed</span>
    </div>
    <div class="card" style="text-align:center;padding:16px">
      <h2 style="margin-bottom:4px">Topic Review</h2>
      <p class="subtitle">Read through each model before testing yourself. Tap a topic to dive in.</p>
      <div class="progress-bar" style="margin-top:10px"><div class="progress-fill" style="width:${pct}%;background:var(--green)"></div></div>
    </div>
    ${cards}
    ${reviewedCount === totalTopics ? `<button class="btn btn-primary btn-block" style="margin-top:8px" onclick="startFlashcards()">Ready! Start Flashcards →</button>` : ''}
  `);
}

function renderReviewTopic(topicKey){
  reviewVisited.add(topicKey);
  const review = topicReviews[topicKey];
  const topicKeys = Object.keys(TOPICS);
  const currentIdx = topicKeys.indexOf(topicKey);
  const prevTopic = currentIdx > 0 ? topicKeys[currentIdx - 1] : null;
  const nextTopic = currentIdx < topicKeys.length - 1 ? topicKeys[currentIdx + 1] : null;

  const navDots = topicKeys.map((t,i)=>{
    const isActive = t === topicKey;
    const isVisited = reviewVisited.has(t) && !isActive;
    const cls = isActive ? 'active' : isVisited ? 'visited' : '';
    return `<span class="review-nav-dot ${cls}" onclick="renderReviewTopic('${t}')">${TOPICS[t]}</span>`;
  }).join('');

  const sectionsHtml = review.sections.map(s=>`
    <div class="review-section">
      <div class="review-section-heading">${s.heading}</div>
      <div class="review-section-content">${s.content}</div>
      ${s.diagram ? `<div style="margin:14px 0;text-align:center;overflow-x:auto">${s.diagram}</div>` : ''}
      ${s.example ? `<div style="margin-top:10px;padding:12px 16px;background:#f0f4f8;border-radius:8px;border-left:3px solid var(--accent);font-size:.88rem;line-height:1.6"><strong style="color:var(--accent)">Example:</strong> ${s.example}</div>` : ''}
    </div>
  `).join('');

  render(`
    <div class="nav-row">
      <button class="back-btn" onclick="renderReviewList()">← All Topics</button>
      <span class="question-num">${currentIdx+1} / ${topicKeys.length}</span>
    </div>
    <div class="review-nav">${navDots}</div>
    <div class="card">
      <h2 style="margin-bottom:16px">${review.title}</h2>
      ${sectionsHtml}
    </div>
    <div style="display:flex;gap:10px;margin-top:10px">
      ${prevTopic ? `<button class="btn btn-outline" style="flex:1" onclick="renderReviewTopic('${prevTopic}')">← ${TOPICS[prevTopic]}</button>` : '<div style="flex:1"></div>'}
      ${nextTopic ? `<button class="btn btn-primary" style="flex:1" onclick="renderReviewTopic('${nextTopic}')">${TOPICS[nextTopic]} →</button>` : `<button class="btn btn-green" style="flex:1" onclick="renderReviewList()">Done! ✓</button>`}
    </div>
  `);
  window.scrollTo(0,0);
}

let lqQuestions, lqIndex, lqTimer, lqTimeLeft, lqScore, lqAnswered;

function startLightning(){
  lqQuestions = sortByWeakness(shuffle(lightningQuiz));
  lqIndex = 0;
  lqScore = 0;
  lqAnswered = false;
  renderLightningQ();
}

function updateLightningTimer(){
  const bar = document.getElementById('lq-bar');
  const time = document.getElementById('lq-time');
  if(bar) bar.style.width = (lqTimeLeft/60*100)+'%';
  if(bar) bar.className = 'bar-fill' + (lqTimeLeft <= 15 ? ' danger' : lqTimeLeft <= 30 ? ' warning' : '');
  if(time) time.textContent = lqTimeLeft + 's';
}

function renderLightningQ(){
  if(lqIndex >= lqQuestions.length){clearInterval(lqTimer);renderLightningResults();return;}
  clearInterval(lqTimer);
  lqAnswered = false;
  lqTimeLeft = 60;
  lqTimer = setInterval(()=>{
    lqTimeLeft--;
    updateLightningTimer();
    if(lqTimeLeft <= 0){
      clearInterval(lqTimer);
      if(!lqAnswered){
        lqAnswered = true;
        recordAnswer(lqQuestions[lqIndex].topic, false);
        const expEl = document.getElementById('lq-explanation');
        if(expEl) expEl.innerHTML = `<div class="explanation wrong-exp">⏱ Time's up! ${lqQuestions[lqIndex].why}</div>`;
        for(let i=0;i<lqQuestions[lqIndex].options.length;i++){
          const btn = document.getElementById('lq-opt-'+i);
          if(btn) btn.classList.add('disabled');
          if(i === lqQuestions[lqIndex].answer && btn) btn.classList.add('correct');
        }
        setTimeout(()=>{lqIndex++;renderLightningQ();}, 2500);
      }
    }
  }, 1000);
  const q = lqQuestions[lqIndex];
  const optionsHtml = q.options.map((o,i)=>
    `<button class="option-btn" id="lq-opt-${i}" onclick="answerLightning(${i})">${String.fromCharCode(65+i)}. ${o}</button>`
  ).join('');

  render(`
    <div class="nav-row">
      <button class="back-btn" onclick="clearInterval(lqTimer);renderHome()">← Back</button>
      <span class="question-num">Q${lqIndex+1} | Score: ${lqScore}</span>
    </div>
    <div class="timer-bar">
      <span id="lq-time">${lqTimeLeft}s</span>
      <div class="bar"><div class="bar-fill" id="lq-bar" style="width:${lqTimeLeft/60*100}%"></div></div>
    </div>
    <div class="tag">${TOPICS[q.topic]}</div>
    <div class="card">
      <p style="font-size:.95rem;margin-bottom:14px;font-weight:500">${q.q}</p>
      ${optionsHtml}
      <div id="lq-explanation"></div>
    </div>
  `);
}

function answerLightning(idx){
  if(lqAnswered) return;
  lqAnswered = true;
  clearInterval(lqTimer);
  const q = lqQuestions[lqIndex];
  const correct = idx === q.answer;
  if(correct) lqScore++;
  recordAnswer(q.topic, correct);

  for(let i=0;i<q.options.length;i++){
    const btn = document.getElementById('lq-opt-'+i);
    btn.classList.add('disabled');
    if(i === q.answer) btn.classList.add('correct');
    else if(i === idx && !correct) btn.classList.add('wrong');
  }

  const expClass = correct ? 'correct-exp' : 'wrong-exp';
  document.getElementById('lq-explanation').innerHTML = `<div class="explanation ${expClass}">${correct ? '✓ Correct!' : '✗ Incorrect.'} ${q.why}</div>`;

  setTimeout(()=>{lqIndex++;renderLightningQ();}, correct ? 1200 : 2500);
}

function renderLightningResults(){
  const total = lqIndex;
  const pct = total > 0 ? Math.round(lqScore/total*100) : 0;
  render(`
    <div class="nav-row"><button class="back-btn" onclick="renderHome()">← Back</button></div>
    <div class="card" style="text-align:center">
      <h2>Lightning Quiz Results</h2>
      <div class="score-big">${lqScore}/${total}</div>
      <div class="score-label">${pct}% correct (60s per question)</div>
      <button class="btn btn-primary" style="margin-top:16px" onclick="startLightning()">Try Again</button>
      <button class="btn btn-outline" style="margin-top:8px" onclick="renderHome()">Back to Menu</button>
    </div>
  `);
}

let examQs, examIdx, examAnswers, examTimer, examTimeLeft, examStarted;

function startExam(){
  examQs = shuffle(examPool).slice(0,25);
  examIdx = 0;
  examAnswers = new Array(25).fill(null);
  examTimeLeft = 90*60;
  examStarted = false;

  render(`
    <div class="nav-row"><button class="back-btn" onclick="renderHome()">← Back</button></div>
    <div class="card" style="text-align:center">
      <h2>Exam Simulator</h2>
      <p style="color:var(--gray);margin-bottom:16px">25 multiple-choice questions. 90-minute timer. Your score will be broken down by topic at the end.</p>
      <button class="btn btn-primary" onclick="beginExam()">Start Exam</button>
    </div>
  `);
}

function beginExam(){
  examStarted = true;
  examTimer = setInterval(()=>{
    examTimeLeft--;
    updateExamTimer();
    if(examTimeLeft <= 0){
      clearInterval(examTimer);
      gradeExam();
    }
  },1000);
  renderExamQ();
}

function updateExamTimer(){
  const el = document.getElementById('exam-timer');
  if(!el) return;
  const m = Math.floor(examTimeLeft/60);
  const s = examTimeLeft%60;
  el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
  el.style.color = examTimeLeft <= 300 ? 'var(--red)' : 'var(--primary)';
}

function renderExamQ(){
  if(examIdx >= examQs.length){gradeExam();return;}
  const q = examQs[examIdx];
  const m = Math.floor(examTimeLeft/60);
  const s = examTimeLeft%60;

  const optHtml = q.options.map((o,i)=>{
    const selected = examAnswers[examIdx] === i ? 'border-color:var(--accent);background:var(--accent-light)' : '';
    return `<button class="option-btn" style="${selected}" onclick="examSelect(${i})">${String.fromCharCode(65+i)}. ${o}</button>`;
  }).join('');

  // Question nav dots
  const dots = examQs.map((_,i)=>{
    const filled = examAnswers[i] !== null;
    const current = i === examIdx;
    const bg = current ? 'var(--accent)' : filled ? 'var(--primary)' : 'var(--gray-light)';
    const border = current ? '2px solid var(--accent)' : 'none';
    return `<div onclick="examIdx=${i};renderExamQ()" style="width:20px;height:20px;border-radius:50%;background:${bg};cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.6rem;color:${filled||current?'#fff':'var(--gray)'};border:${border}">${i+1}</div>`;
  }).join('');

  render(`
    <div class="nav-row">
      <button class="back-btn" onclick="if(confirm('End exam?')){clearInterval(examTimer);renderHome()}">← End Exam</button>
      <span id="exam-timer" style="font-weight:700;font-size:.95rem">${m}:${s.toString().padStart(2,'0')}</span>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px">${dots}</div>
    <div class="tag">${TOPICS[q.topic]}</div>
    <div class="card">
      <p style="font-size:.95rem;margin-bottom:14px;font-weight:500">Q${examIdx+1}. ${q.q}</p>
      ${optHtml}
    </div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-outline" style="flex:1" onclick="examIdx=Math.max(0,examIdx-1);renderExamQ()" ${examIdx===0?'disabled':''}>Previous</button>
      ${examIdx < examQs.length - 1 ?
        `<button class="btn btn-primary" style="flex:1" onclick="examIdx++;renderExamQ()">Next</button>` :
        `<button class="btn btn-green" style="flex:1" onclick="gradeExam()">Submit Exam</button>`
      }
    </div>
  `);
}

function examSelect(idx){
  examAnswers[examIdx] = idx;
  renderExamQ();
}

function gradeExam(){
  clearInterval(examTimer);
  let totalCorrect = 0;
  const topicBreakdown = {};

  examQs.forEach((q,i)=>{
    if(!topicBreakdown[q.topic]) topicBreakdown[q.topic] = {correct:0, total:0};
    topicBreakdown[q.topic].total++;
    const correct = examAnswers[i] === q.answer;
    if(correct){totalCorrect++;topicBreakdown[q.topic].correct++;}
    recordAnswer(q.topic, correct);
  });

  const pct = Math.round(totalCorrect/examQs.length*100);
  const grade = pct >= 93 ? 'A' : pct >= 90 ? 'A-' : pct >= 87 ? 'B+' : pct >= 83 ? 'B' : pct >= 80 ? 'B-' : pct >= 77 ? 'C+' : 'C';
  const gradeColor = pct >= 90 ? 'var(--green)' : pct >= 80 ? 'var(--orange)' : 'var(--red)';

  let topicHtml = Object.keys(topicBreakdown).map(t=>{
    const b = topicBreakdown[t];
    const p = Math.round(b.correct/b.total*100);
    const c = p >= 80 ? 'var(--green)' : p >= 50 ? 'var(--orange)' : 'var(--red)';
    return `<div class="topic-row"><span class="topic-name">${TOPICS[t]}</span><span class="topic-pct" style="color:${c}">${b.correct}/${b.total} (${p}%)</span></div>`;
  }).join('');

  // Review section
  let reviewHtml = examQs.map((q,i)=>{
    const correct = examAnswers[i] === q.answer;
    const yourAnswer = examAnswers[i] !== null ? q.options[examAnswers[i]] : 'Not answered';
    const icon = correct ? '✓' : '✗';
    const color = correct ? 'var(--green)' : 'var(--red)';
    return `<div style="padding:10px 0;border-bottom:1px solid var(--gray-light)">
      <div style="display:flex;gap:8px;align-items:start">
        <span style="color:${color};font-weight:700;font-size:1.1rem">${icon}</span>
        <div>
          <p style="font-size:.88rem;font-weight:500">Q${i+1}. ${q.q}</p>
          <p style="font-size:.82rem;color:var(--gray);margin-top:4px">Your answer: ${yourAnswer}</p>
          ${!correct ? `<p style="font-size:.82rem;color:var(--green);margin-top:2px">Correct: ${q.options[q.answer]}</p>` : ''}
          ${!correct ? `<div class="explanation wrong-exp" style="margin-top:6px;font-size:.82rem">${q.why}</div>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');

  render(`
    <div class="nav-row"><button class="back-btn" onclick="renderHome()">← Back</button></div>
    <div class="card" style="text-align:center">
      <h2>Exam Results</h2>
      <div class="score-big" style="color:${gradeColor}">${totalCorrect}/25</div>
      <div class="score-label">${pct}% — Projected Grade: <strong style="color:${gradeColor}">${grade}</strong></div>
      ${pct >= 90 ? '<p style="margin-top:8px;color:var(--green);font-weight:500">You\'re on track for that A-! Keep it up.</p>' : '<p style="margin-top:8px;color:var(--orange);font-weight:500">Review weak topics below and try again.</p>'}
    </div>
    <div class="card">
      <h2>Score by Topic</h2>
      ${topicHtml}
    </div>
    <div class="card">
      <h2>Full Review</h2>
      ${reviewHtml}
    </div>

  `);
